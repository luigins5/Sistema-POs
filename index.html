    // --- POS / QR Sales View ---
    function POSView({ user, role }) {
      const [cart, setCart] = useState([]);
      const [scanValue, setScanValue] = useState('');
      const [showCamera, setShowCamera] = useState(false);
      const [completedSale, setCompletedSale] = useState(null);
      const [load, setLoad] = useState('');
      const [reloadKey, setReloadKey] = useState(0);
      const [customerId, setCustomerId] = useState('');
      const [discountType, setDiscountType] = useState('flat');
      const [discountValue, setDiscountValue] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [tendered, setTendered] = useState('');
      const [held, setHeld] = useState(() => { try { return JSON.parse(localStorage.getItem('pos_held') || '[]'); } catch (e) { return []; } });
      const scanRef = useRef(null);
      const [nameSuggestions, setNameSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const suggestionsRef = useRef(null);

      const { loading: loadingProducts, data: productsData } = useFetch(() => fbGetProducts(), []);
      const products = useMemo(() => (productsData && productsData.success ? productsData.data : []), [productsData]);
      const prodById = useMemo(() => products.reduce((m, p) => (m[p.id] = p, m), {}), [products]);
      const codeIndex = useMemo(() => buildCodeIndex(products), [products]);
      const { data: custData } = useFetch(() => fbGetCustomers(), []);
      const customers = useMemo(() => (custData && custData.success ? custData.data : []), [custData]);
      const customerOpts = useMemo(() => customers.map(c => ({ value: c.id, label: c.name + (c.phone ? ' · ' + c.phone : '') })), [customers]);
      const { loading: loadingMovements, data: movementsData } = useFetch(() => fbGetStockMovements(), [reloadKey]);
      const movements = useMemo(() => (movementsData && movementsData.success ? movementsData.data : []), [movementsData]);
      // gate scanning until both loads land - scanning against a still-empty movements array
      // would make computeQtyOnHand read 0 and falsely reject the very first scan as out-of-stock
      const catalogReady = !loadingProducts && !loadingMovements;

      useEffect(() => { if (catalogReady && !completedSale && !showCamera && scanRef.current) scanRef.current.focus(); }, [catalogReady, completedSale, showCamera, cart]);

      const capacityCheck = useCallback((productId, name, nextQty) => {
        const onHand = computeQtyOnHand(productId, movements);
        if (nextQty > onHand) {
          Swal.fire({ icon: 'warning', title: 'Stock insuficiente', text: `Solo ${onHand} unidad(es) de ${name} en stock.` });
          return false;
        }
        return true;
      }, [movements]);

      const addToCart = useCallback((product, qtyToAdd) => {
        setCart(prev => {
          const existing = prev.find(l => l.productId === product.id);
          const nextQty = (existing ? existing.qty : 0) + qtyToAdd;
          if (!capacityCheck(product.id, product.name, nextQty)) return prev;
          if (existing) return prev.map(l => l.productId === product.id ? { ...l, qty: nextQty } : l);
          return [...prev, { productId: product.id, name: product.name, sku: product.sku, price: Number(product.price) || 0, qty: qtyToAdd }];
        });
      }, [capacityCheck]);

      const resolveAndAddToCart = useCallback(async (rawCode) => {
        const code = String(rawCode || '').trim();
        if (!code) return;
        if (!catalogReady) { Swal.fire({ icon: 'warning', title: 'Cargando', text: 'El catálogo sigue cargando, inténtalo en un momento.' }); return; }
        const local = codeIndex.get(code.toLowerCase()); // instant - no network round-trip per scan
        if (local) { addToCart(local, 1); return; }
        const res = await fbFindProductByCode(code); // miss: product may be newer than our cached catalog
        if (!res.success) { Swal.fire({ icon: 'error', title: 'No Encontrado', text: res.message || `Ningún producto coincide con "${code}"` }); return; }
        addToCart(res.data, 1);
      }, [addToCart, catalogReady, codeIndex]);

      const handleScanSubmit = (e) => {
        e.preventDefault();
        const code = scanValue;
        setScanValue('');
        setShowSuggestions(false);
        setNameSuggestions([]);
        resolveAndAddToCart(code);
      };

      const handleScanChange = (e) => {
        const val = e.target.value;
        setScanValue(val);
        if (catalogReady && val.length >= 2) {
          const matches = searchProductsByName(products, val);
          setNameSuggestions(matches);
          setShowSuggestions(matches.length > 0);
        } else {
          setNameSuggestions([]);
          setShowSuggestions(false);
        }
      };

      const selectSuggestion = (product) => {
        setScanValue('');
        setShowSuggestions(false);
        setNameSuggestions([]);
        addToCart(product, 1);
        if (scanRef.current) scanRef.current.focus();
      };

      // close suggestions when clicking outside
      useEffect(() => {
        const handler = (e) => {
          if (suggestionsRef.current && !suggestionsRef.current.contains(e.target) && scanRef.current && !scanRef.current.contains(e.target)) {
            setShowSuggestions(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const handleDetected = (decodedText) => { setShowCamera(false); resolveAndAddToCart(decodedText); };

      const changeQty = (productId, delta) => {
        setCart(prev => {
          const line = prev.find(l => l.productId === productId);
          if (!line) return prev;
          const nextQty = line.qty + delta;
          if (nextQty <= 0) return prev.filter(l => l.productId !== productId);
          if (!capacityCheck(productId, line.name, nextQty)) return prev;
          return prev.map(l => l.productId === productId ? { ...l, qty: nextQty } : l);
        });
      };

      const removeLine = (productId) => setCart(prev => prev.filter(l => l.productId !== productId));

      const totals = useMemo(() => computeSaleTotals(cart, prodById, { type: discountType, value: discountValue }), [cart, prodById, discountType, discountValue]);
      const itemCount = useMemo(() => cart.reduce((s, l) => s + l.qty, 0), [cart]);
      const changeDue = paymentMethod === 'Cash' ? Math.max(0, (Number(tendered) || 0) - totals.grand) : 0;

      const persistHeld = (list) => { setHeld(list); localStorage.setItem('pos_held', JSON.stringify(list)); };
      const resetSale = () => { setCart([]); setCustomerId(''); setDiscountValue(''); setDiscountType('flat'); setPaymentMethod('Cash'); setTendered(''); };

      // park the current cart (customer + discount too) to localStorage, then clear the till
      const holdSale = () => {
        if (!cart.length) return;
        const cust = customers.find(c => c.id === customerId);
        const label = (cust ? cust.name : 'Mostrador') + ' · ' + cart.reduce((n, l) => n + l.qty, 0) + ' art(s) · ' + money(totals.grand);
        persistHeld([...held, { id: Date.now(), label, cart, customerId, discountType, discountValue, ts: nowIso() }]);
        resetSale();
        Swal.fire({ icon: 'success', title: 'En Espera', text: 'Venta puesta en espera — recupérala en cualquier momento.', timer: 1400, showConfirmButton: false });
      };

      const recallHeld = async () => {
        if (!held.length) { Swal.fire({ icon: 'info', title: 'No hay ventas en espera' }); return; }
        const opts = {}; held.forEach((h, i) => opts[i] = h.label);
        const { value } = await Swal.fire({ title: 'Recuperar venta en espera', input: 'select', inputOptions: opts, inputPlaceholder: 'Selecciona una', showCancelButton: true, confirmButtonText: 'Recuperar' });
        if (value == null) return;
        const h = held[Number(value)]; if (!h) return;
        setCart(h.cart || []); setCustomerId(h.customerId || ''); setDiscountType(h.discountType || 'flat'); setDiscountValue(h.discountValue || '');
        persistHeld(held.filter((_, i) => i !== Number(value)));
      };

      const handleCheckout = async () => {
        if (cart.length === 0) return;
        if (paymentMethod === 'Cash' && (Number(tendered) || 0) < totals.grand) {
          const go = await Swal.fire({ icon: 'warning', title: 'Pago insuficiente', text: `El pago es menor que ${money(totals.grand)}. ¿Continuar de todos modos?`, showCancelButton: true, confirmButtonText: 'Sí, continuar' });
          if (!go.isConfirmed) return;
        }
        if (paymentMethod === 'Credit' && !customerId) { Swal.fire({ icon: 'warning', title: 'Elige un cliente', text: 'Las ventas a crédito deben asociarse a un cliente.' }); return; }
        setLoad('Procesando venta...');
        const cust = customers.find(c => c.id === customerId);
        const sale = {
          items: totals.lines, subtotal: totals.subtotal, discount: totals.discount, discountType, tax: totals.tax, total: totals.grand,
          paymentMethod, amountTendered: paymentMethod === 'Cash' ? (Number(tendered) || 0) : (paymentMethod === 'Credit' ? 0 : totals.grand), changeDue: round2(changeDue),
          customerId: customerId || '', customerName: cust ? cust.name : 'Walk-in', status: paymentMethod === 'Credit' ? 'credit' : 'completed'
        };
        const res = await fbCreateSale(sale, user);
        setLoad('');
        if (res.success) {
          setCompletedSale(res.data);
          resetSale();
          setReloadKey(k => k + 1);
          Swal.fire({ icon: 'success', title: 'Venta Completada', text: `${res.data.invoiceNo || ''} — ${money(res.data.total)}`, timer: 1800, showConfirmButton: false });
        } else {
          Swal.fire({ icon: 'error', title: 'Error al procesar', text: res.message });
        }
      };

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header">
            <h2><i className="fas fa-cash-register"></i> Punto de Venta (POS)</h2>
            <div className="pos-scan-actions">
              <button className="btn btn-secondary" disabled={!catalogReady} onClick={() => setShowCamera(true)}><i className="fas fa-camera"></i> Cámara</button>
              <button className="btn btn-secondary" onClick={recallHeld}><i className="fas fa-clock-rotate-left"></i> En Espera{held.length ? ` (${held.length})` : ''}</button>
            </div>
          </div>

          <form className="pos-scan-box" onSubmit={handleScanSubmit} style={{ position: 'relative' }}>
            <div className="form-group" style={{ position: 'relative' }}>
              <label><i className="fas fa-barcode"></i> Escanea o escribe SKU / Código / Nombre de Producto</label>
              <input ref={scanRef} type="text" className="pos-scan-input" autoFocus disabled={!catalogReady} value={scanValue}
                onChange={handleScanChange} onFocus={() => { if (nameSuggestions.length > 0) setShowSuggestions(true); }}
                placeholder={catalogReady ? 'Escanea código o ingresa SKU, luego presiona Enter' : 'Cargando catálogo...'}
                autoComplete="off" />
              {showSuggestions && nameSuggestions.length > 0 && (
                <div ref={suggestionsRef} className="pos-name-suggestions">
                  {nameSuggestions.map(p => (
                    <div key={p.id} className="pos-suggestion-item" onClick={() => selectSuggestion(p)}>
                      <div className="pos-sug-name">{p.name}</div>
                      <div className="pos-sug-meta"><span>{p.sku}</span><span>{money(p.price)}</span></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button type="submit" className="btn btn-primary" disabled={!catalogReady}><i className="fas fa-plus"></i> Agregar</button>
          </form>

          <div className="pos-grid">
            <div>
              {loadingProducts ? <TableSkeleton rows={4} columns={4} /> : <Cart items={cart} onInc={(id) => changeQty(id, 1)} onDec={(id) => changeQty(id, -1)} onRemove={removeLine} />}
            </div>
            <div className="pos-summary">
              <SearchableDropdown label="Cliente" icon="fas fa-user" options={customerOpts} value={customerId} onChange={setCustomerId} placeholder="Cliente mostrador" />
              <div className="pos-disc-row">
                <SearchableDropdown label="Descuento" icon="fas fa-tags" options={DISCOUNT_TYPE_OPTS} value={discountType} onChange={setDiscountType} placeholder="Monto" />
                <div className="form-group"><label>Valor</label><input type="number" min="0" step="0.01" placeholder="0" value={discountValue} onChange={(e) => setDiscountValue(e.target.value)} /></div>
              </div>
              <SearchableDropdown label="Método de Pago" icon="fas fa-money-bill-wave" options={PAYMENT_OPTS} value={paymentMethod} onChange={setPaymentMethod} placeholder="Efectivo" />
              {paymentMethod === 'Cash' && <div className="form-group"><label>Monto Recibido</label><input type="number" min="0" step="0.01" value={tendered} onChange={(e) => setTendered(e.target.value)} /></div>}
              <div className="pos-summary-row"><span>Artículos</span><span>{itemCount}</span></div>
              <div className="pos-summary-row"><span>Subtotal</span><span>{money(totals.subtotal)}</span></div>
              {totals.discount > 0 && <div className="pos-summary-row"><span>Descuento</span><span>- {money(totals.discount)}</span></div>}
              {totals.tax > 0 && <div className="pos-summary-row"><span>Impuesto{CFG.taxInclusive ? ' (incl)' : ''}</span><span>{money(totals.tax)}</span></div>}
              <div className="pos-summary-row grand"><span>Total Final</span><span>{money(totals.grand)}</span></div>
              {paymentMethod === 'Cash' && (Number(tendered) || 0) > 0 && <div className="pos-summary-row"><span>Cambio</span><span>{money(changeDue)}</span></div>}
              <div className="pos-checkout-actions">
                <button className="btn btn-secondary" disabled={cart.length === 0} onClick={holdSale}><i className="fas fa-pause"></i> Poner en Espera</button>
                <button className="btn btn-success" disabled={cart.length === 0} onClick={handleCheckout}><i className="fas fa-check"></i> Cobrar</button>
              </div>
            </div>
          </div>

          {showCamera && <CameraScanModal onDetected={handleDetected} onClose={() => setShowCamera(false)} />}
          {completedSale && <ThermalReceiptOverlay sale={completedSale} onClose={() => setCompletedSale(null)} />}
        </div>
      );
    }

    // --- Process Return (against a past sale) ---
    function ReturnModal({ sale, returns, user, onClose, onDone }) {
      const already = useMemo(() => (sale.items || []).map(it => computeReturnedQty(sale.id, it.productId, returns)), [sale, returns]);
      const [qtys, setQtys] = useState(() => (sale.items || []).map(() => 0));
      const [saving, setSaving] = useState(false);

      const remaining = (idx) => sale.items[idx].qty - already[idx];
      const setQty = (idx, val) => {
        const max = remaining(idx);
        const v = Math.max(0, Math.min(max, Number(val) || 0));
        setQtys(prev => prev.map((q, i) => i === idx ? v : q));
      };

      const totalRefund = useMemo(() => qtys.reduce((s, q, i) => s + q * sale.items[i].price, 0), [qtys, sale.items]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const items = sale.items
          .map((it, i) => ({ productId: it.productId, name: it.name, sku: it.sku, qty: qtys[i], price: it.price, lineTotal: qtys[i] * it.price }))
          .filter(it => it.qty > 0);
        if (!items.length) return Swal.fire({ icon: 'warning', title: 'Nada Seleccionado', text: 'Ingresa una cantidad de devolución para al menos un artículo' });
        setSaving(true);
        const result = await fbCreateReturn(sale.id, items, user);
        setSaving(false);
        if (result.success) {
          Swal.fire({ icon: 'success', title: 'Devolución Procesada', text: 'Reembolso: ' + money(totalRefund), timer: 2000, showConfirmButton: false });
          onDone();
        } else {
          Swal.fire({ icon: 'error', title: 'Error', text: result.message });
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-rotate-left"></i> Procesar Devolución - Venta {String(sale.id).slice(-6).toUpperCase()}</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <form onSubmit={handleSubmit}>
                <div className="about-table-wrapper">
                  <table className="about-roles-table">
                    <thead><tr><th>Artículo</th><th>Vendido</th><th>Ya Devuelto</th><th>Cant. a Devolver</th><th>Reembolso</th></tr></thead>
                    <tbody>
                      {sale.items.map((it, i) => (
                        <tr key={it.sku || i}>
                          <td>{it.name}</td>
                          <td>{it.qty}</td>
                          <td>{already[i]}</td>
                          <td><input type="number" min="0" max={remaining(i)} value={qtys[i]} onChange={(e) => setQty(i, e.target.value)} style={{ width: '80px' }} /></td>
                          <td>{money(qtys[i] * it.price)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <p className="stock-onhand-hint" style={{ marginTop: '16px' }}>Reembolso Total: <strong>{money(totalRefund)}</strong></p>
                <div className="form-actions">
                  <button type="submit" className="btn btn-danger" disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Procesando...</> : <><i className="fas fa-rotate-left"></i> Procesar Devolución</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- Sales History (view past sales, reprint receipts, process returns) ---
    function SalesHistoryView({ user, role }) {
      const [reloadKey, setReloadKey] = useState(0);
      const [returnSaleId, setReturnSaleId] = useState(null);
      const [viewSale, setViewSale] = useState(null);
      const tableInstanceRef = useRef(null);

      const { loading, data, err } = useFetch(() => Promise.all([fbGetSales(), fbGetReturns()]), [reloadKey]);
      const sales = useMemo(() => { let arr = (data && data[0] && data[0].success ? data[0].data : []); return role === 'Vendedor Móvil' ? arr.filter(s => s.cashier === user?.name) : arr; }, [data, role, user?.name]);
      const returns = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const reload = () => setReloadKey(k => k + 1);
      const byId = useMemo(() => sales.reduce((m, s) => (m[s.id] = s, m), {}), [sales]);

      const tableData = useMemo(() => sales.map(s => {
        const itemCount = (s.items || []).reduce((n, it) => n + it.qty, 0);
        const cogs = (s.items || []).reduce((c, it) => c + (Number(it.cost) || 0) * it.qty, 0);
        const profit = round2(Number(s.subtotal != null ? s.subtotal : s.total || 0) - Number(s.discount || 0) - cogs);
        const returnedTotal = returns.filter(r => r.saleId === s.id).reduce((sum, r) => sum + Number(r.totalRefund || 0), 0);
        return Object.assign({}, s, { itemCount, profit, returnedTotal });
      }), [sales, returns]);

      const summary = useMemo(() => ({
        count: sales.length,
        total: tableData.reduce((s, r) => s + Number(r.total || 0), 0),
        profit: tableData.reduce((s, r) => s + Number(r.profit || 0), 0),
        returned: tableData.reduce((s, r) => s + Number(r.returnedTotal || 0), 0)
      }), [tableData, sales.length]);

      useEffect(() => {
        if (err || (data && data[0] && !data[0].success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data[0] && data[0].message) || 'Error al cargar ventas' });
      }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableInstanceRef.current;
        if (table) {
          table.clear().rows.add(tableData).draw(false);
        } else {
          table = $('#salesTable').DataTable({
            data: tableData,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            createdRow: (row, d) => { if (d.status === 'credit') $(row).addClass('row-danger'); else if (Number(d.returnedTotal) > 0) $(row).addClass('row-warn'); }, // credit=red, has-return=amber
            columns: [
              { data: 'invoiceNo', title: 'Factura', render: (d, t, row) => t === 'display' ? '<code>' + esc(d || String(row.id).slice(-6).toUpperCase()) + '</code>' : (d || row.id) },
              { data: 'createdAt', title: 'Fecha', render: (d, t) => t === 'display' ? formatDateForDisplay(d) : d },
              { data: 'customerName', title: 'Cliente', render: (d, t) => t === 'display' ? esc(d || 'Mostrador') : d },
              { data: 'cashier', title: 'Cajero', render: (d, t) => t === 'display' ? esc(d || '') : d },
              { data: 'itemCount', title: 'Artículos' },
              { data: 'total', title: 'Total', render: (d, t) => t === 'display' ? money(d) : d },
              { data: 'paymentMethod', title: 'Pago', render: (d, t) => t === 'display' ? (d ? '<span class="type-chip">' + esc(d) + '</span>' : '-') : (d || '') },
              { data: 'profit', title: 'Ganancia', render: (d, t) => t === 'display' ? `<span style="color:${Number(d) >= 0 ? '#155724' : '#721c24'};font-weight:600">${money(d)}</span>` : d },
              { data: 'returnedTotal', title: 'Devuelto', render: (d, t) => t === 'display' ? (d > 0 ? '<span class="status-badge status-inactive">' + money(d) + '</span>' : '-') : d },
              { data: null, title: 'Acciones', orderable: false, render: () => `<button class="action-icon edit-icon" data-action="view"><i class="fas fa-receipt"></i></button>` + (role === 'Admin' ? `<button class="action-icon qr-icon" data-action="return"><i class="fas fa-rotate-left"></i></button>` : '') }
            ],
            pageLength: 10,
            lengthMenu: [[10, 25, 50, -1], [10, 25, 50, 'All']],
            responsive: true,
            dom: 'Blfrtip',
            buttons: [
              { extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'print', text: '<i class="fas fa-print"></i> Imprimir', exportOptions: { columns: ':not(:last-child)' } }
            ],
            order: [[1, 'desc']]
          });
          tableInstanceRef.current = table;
        }
        $('#salesTable').off('click', '.action-icon').on('click', '.action-icon', function () {
          const id = table.row($(this).parents('tr')).data().id;
          const action = $(this).data('action');
          if (action === 'view') setViewSale(byId[id]);
          else if (action === 'return') setReturnSaleId(id);
        });
      }, [loading, tableData, role]);

      useEffect(() => () => {
        if (tableInstanceRef.current) { try { tableInstanceRef.current.destroy(); tableInstanceRef.current = null; } catch (e) { } }
      }, []);

      return (
        <div className="data-section">
          <div className="section-header"><h2><i className="fas fa-receipt"></i> Historial de Ventas</h2><RefreshBtn onClick={reload} /></div>
          {loading && <TableSkeleton rows={8} columns={10} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="salesTable" className="display" style={{ width: '100%' }}></table>
            {sales.length > 0 && <SummaryBar items={[{ label: 'Ventas', value: summary.count }, { label: 'Total', value: money(summary.total) }, { label: 'Ganancia', value: money(summary.profit) }, { label: 'Devuelto', value: money(summary.returned) }]} />}
          </div>
          {viewSale && <ThermalReceiptOverlay sale={viewSale} onClose={() => setViewSale(null)} />}
          {returnSaleId && <ReturnModal sale={byId[returnSaleId]} returns={returns} user={user} onClose={() => setReturnSaleId(null)} onDone={() => { setReturnSaleId(null); reload(); }} />}
        </div>
      );
    }

    // --- Dashboard View (Admin only) - POS overview ---
    function DashboardView({ user, role, setActiveMenu }) {
      const { loading, data } = useFetch(() => Promise.all([fbGetSales(), fbGetProducts(), fbGetStockMovements(), fbGetExpenses()]), []);
      const sales = useMemo(() => (data && data[0] && data[0].success ? data[0].data : []), [data]);
      const products = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const movements = useMemo(() => (data && data[2] && data[2].success ? data[2].data : []), [data]);
      const expenses = useMemo(() => (data && data[3] && data[3].success ? data[3].data : []), [data]);

      const barRef = useRef(null), payRef = useRef(null);
      const barChart = useRef(null), payChart = useRef(null);
      const ymd = (d) => { try { return new Date(d).toISOString().slice(0, 10); } catch (e) { return ''; } };
      const today = new Date().toISOString().slice(0, 10);

      const s = useMemo(() => {
        const todaySales = sales.filter(x => ymd(x.createdAt) === today);
        const lowStock = products.filter(p => computeQtyOnHand(p.id, movements) <= Number(p.reorderLevel || 0));
        const month = today.slice(0, 7);
        const monthRevenue = sales.filter(x => ymd(x.createdAt).slice(0, 7) === month).reduce((a, x) => a + Number(x.total || 0), 0);
        const monthExpenses = expenses.filter(e => (e.date || ymd(e.createdAt)).slice(0, 7) === month).reduce((a, e) => a + Number(e.amount || 0), 0);
        return {
          todayRevenue: todaySales.reduce((a, x) => a + Number(x.total || 0), 0),
          todayOrders: todaySales.length,
          lowStock,
          creditOutstanding: sales.filter(x => x.status === 'credit').reduce((a, x) => a + Number(x.total || 0), 0),
          stockValue: products.reduce((a, p) => a + computeQtyOnHand(p.id, movements) * (Number(p.cost) || 0), 0),
          monthRevenue, monthExpenses
        };
      }, [sales, products, movements, expenses, today]);

      const recentSales = useMemo(() => [...sales].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 6), [sales]);

      useEffect(() => {
        if (loading) return;
        const days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d; });
        const labels = days.map(d => d.toLocaleDateString('es-MX', { weekday: 'short' }));
        const revByDay = days.map(d => { const k = d.toISOString().slice(0, 10); return sales.filter(x => ymd(x.createdAt) === k).reduce((a, x) => a + Number(x.total || 0), 0); });
        const byPay = sales.reduce((m, x) => { const k = x.paymentMethod || 'Other'; m[k] = (m[k] || 0) + Number(x.total || 0); return m; }, {});

        if (barChart.current) barChart.current.destroy();
        if (barRef.current) barChart.current = new Chart(barRef.current, {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Ingresos', data: revByDay, backgroundColor: 'rgba(0,116,217,0.7)', borderColor: '#0074D9', borderWidth: 2, borderRadius: 6, borderSkipped: false }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
        if (payChart.current) payChart.current.destroy();
        if (payRef.current) payChart.current = new Chart(payRef.current, {
          type: 'doughnut',
          data: { labels: Object.keys(byPay), datasets: [{ data: Object.values(byPay), backgroundColor: ['#001f3f', '#0074D9', '#34a853', '#fbbc04', '#ea4335', '#8e44ad'], borderColor: '#fff', borderWidth: 2 }] },
          options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'bottom' } } }
        });
        return () => { if (barChart.current) barChart.current.destroy(); if (payChart.current) payChart.current.destroy(); };
      }, [loading, sales]);

      if (loading) return <div className="lte-kpi-grid">{[...Array(4)].map((_, i) => <DashboardCardSkeleton key={i} />)}</div>;

      return (
        <div>
          <div className="quick-actions">
            <button className="btn btn-success" onClick={() => setActiveMenu('pos')}><i className="fas fa-cash-register"></i> Nueva Venta</button>
            <button className="btn btn-primary" onClick={() => setActiveMenu('products')}><i className="fas fa-box"></i> Agregar Producto</button>
            <button className="btn btn-primary" onClick={() => setActiveMenu('purchase-orders')}><i className="fas fa-file-invoice-dollar"></i> Nueva OC</button>
            <button className="btn btn-secondary" onClick={() => setActiveMenu('expenses')}><i className="fas fa-money-bill-trend-up"></i> Agregar Gasto</button>
          </div>
          <div className="lte-kpi-grid">
            <SmallBox value={money(s.todayRevenue)} label="Ventas de Hoy" icon="fa-sack-dollar" color="bg-success" onMore={() => setActiveMenu('sales-history')} />
            <SmallBox value={s.todayOrders} label="Pedidos de Hoy" icon="fa-receipt" color="bg-navy" onMore={() => setActiveMenu('sales-history')} />
            <SmallBox value={s.lowStock.length} label="Productos con Stock Bajo" icon="fa-triangle-exclamation" color="bg-warning" onMore={() => setActiveMenu('products')} />
            <SmallBox value={money(s.creditOutstanding)} label="Crédito Pendiente" icon="fa-hand-holding-dollar" color="bg-danger" onMore={() => setActiveMenu('sales-history')} />
          </div>
          <div className="lte-kpi-grid">
            <div className="info-box"><div className="info-box-icon bg-navy"><i className="fas fa-warehouse"></i></div><div className="info-box-content"><div className="info-box-text">Valor del Stock</div><div className="info-box-number">{money(s.stockValue)}</div></div></div>
            <div className="info-box"><div className="info-box-icon bg-success"><i className="fas fa-arrow-trend-up"></i></div><div className="info-box-content"><div className="info-box-text">Ingresos del Mes</div><div className="info-box-number">{money(s.monthRevenue)}</div></div></div>
            <div className="info-box"><div className="info-box-icon bg-danger"><i className="fas fa-arrow-trend-down"></i></div><div className="info-box-content"><div className="info-box-text">Gastos del Mes</div><div className="info-box-number">{money(s.monthExpenses)}</div></div></div>
            <div className="info-box"><div className="info-box-icon bg-info"><i className="fas fa-scale-balanced"></i></div><div className="info-box-content"><div className="info-box-text">Neto del Mes</div><div className="info-box-number">{money(s.monthRevenue - s.monthExpenses)}</div></div></div>
          </div>
          <div className="dashboard-grid-2">
            <LteCard title="Ingresos — Últimos 7 Días" icon="fa-chart-column"><div className="chart-container"><canvas ref={barRef}></canvas></div></LteCard>
            <LteCard title="Ventas por Método de Pago" icon="fa-chart-pie"><div className="chart-container"><canvas ref={payRef}></canvas></div></LteCard>
          </div>
          <div className="dashboard-grid-2">
            <LteCard title="Ventas Recientes" icon="fa-receipt">
              {recentSales.length === 0 ? <p style={{ color: '#999' }}>Aún no hay ventas.</p> : (
                <div className="about-table-wrapper">
                  <table className="about-roles-table">
                    <thead><tr><th>Factura</th><th>Cliente</th><th>Total</th><th>Cuándo</th></tr></thead>
                    <tbody>{recentSales.map(x => <tr key={x.id}><td>{x.invoiceNo || String(x.id).slice(-6).toUpperCase()}</td><td>{x.customerName || 'Walk-in'}</td><td>{money(x.total)}</td><td>{getTimeAgo(x.createdAt)}</td></tr>)}</tbody>
                  </table>
                </div>
              )}
            </LteCard>
            <LteCard title="Alertas de Stock Bajo" icon="fa-triangle-exclamation">
              {s.lowStock.length === 0 ? <p style={{ color: '#999' }}>Todos los niveles de stock están saludables.</p> : (
                <div className="about-table-wrapper">
                  <table className="about-roles-table">
                    <thead><tr><th>Producto</th><th>SKU</th><th>Disponible</th><th>Reorden</th></tr></thead>
                    <tbody>{s.lowStock.slice(0, 8).map(p => <tr key={p.id}><td>{p.name}</td><td><code>{p.sku}</code></td><td><span className="status-badge status-inactive">{computeQtyOnHand(p.id, movements)}</span></td><td>{p.reorderLevel || 0}</td></tr>)}</tbody>
                  </table>
                </div>
              )}
            </LteCard>
          </div>
        </div>
      );
    }

    // --- Logs View (Admin only) ---
    function LogsView() {
      const { loading, data } = useFetch(() => fbGetLogs(), []);
      const logs = useMemo(() => (data && data.success ? data.data : []), [data]);
      return (
        <div className="data-section">
          <div className="section-header"><h2><i className="fas fa-history"></i> Registro de Actividad</h2></div>
          {loading ? <TableSkeleton rows={6} columns={4} /> : (
            <div className="about-table-wrapper">
              <table className="about-roles-table">
                <thead><tr><th>Acción</th><th>Detalle</th><th>Usuario</th><th>Fecha</th></tr></thead>
                <tbody>
                  {logs.length === 0 ? <tr><td colSpan="4" style={{ textAlign: 'center', color: '#999' }}>Aún no hay actividad.</td></tr>
                    : logs.map(l => <tr key={l.id}><td>{l.action}</td><td>{l.detail}</td><td>{l.user}</td><td>{formatDateForDisplay(l.ts)}</td></tr>)}
                </tbody>
              </table>

    // --- Purchase Order create modal (supplier + line items) ---
    function PurchaseOrderModal({ suppliers, products, onClose, onSave }) {
      const [supplierId, setSupplierId] = useState('');
      const [expectedDate, setExpectedDate] = useState('');
      const [notes, setNotes] = useState('');
      const [lines, setLines] = useState([]);
      const [productId, setProductId] = useState('');
      const [qty, setQty] = useState('');
      const [unitCost, setUnitCost] = useState('');
      const [saving, setSaving] = useState(false);

      const supplierOpts = useMemo(() => (suppliers || []).map(s => ({ value: s.id, label: s.name })), [suppliers]);
      const productOpts = useMemo(() => (products || []).map(p => ({ value: p.id, label: `${p.name} (${p.sku})` })), [products]);
      const byId = useMemo(() => (products || []).reduce((m, p) => (m[p.id] = p, m), {}), [products]);
      const total = useMemo(() => lines.reduce((s, l) => s + l.qty * l.unitCost, 0), [lines]);

      const addLine = () => {
        const q = Number(qty), c = Number(unitCost);
        if (!productId) return Swal.fire({ icon: 'warning', title: 'Elige un producto' });
        if (!Number.isInteger(q) || q < 1) return Swal.fire({ icon: 'warning', title: 'Cantidad inválida' });
        const p = byId[productId];
        setLines(prev => {
          const ex = prev.find(l => l.productId === productId);
          if (ex) return prev.map(l => l.productId === productId ? { ...l, qty: l.qty + q, unitCost: c || l.unitCost } : l);
          return [...prev, { productId, name: p.name, sku: p.sku, qty: q, unitCost: c || Number(p.cost) || 0 }];
        });
        setProductId(''); setQty(''); setUnitCost('');
      };
      const removeLine = (id) => setLines(prev => prev.filter(l => l.productId !== id));

      const submit = async (status) => {
        if (!supplierId) return Swal.fire({ icon: 'warning', title: 'Elige un proveedor' });
        if (!lines.length) return Swal.fire({ icon: 'warning', title: 'Agrega al menos una línea' });
        const sup = (suppliers || []).find(s => s.id === supplierId);
        setSaving(true);
        await onSave({ supplierId, supplierName: sup ? sup.name : '', items: lines.map(l => ({ ...l, lineTotal: round2(l.qty * l.unitCost) })), total: round2(total), notes: notes.trim() || null, expectedDate: expectedDate || null, status });
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal modal-lg" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header"><h3><i className="fas fa-file-invoice-dollar"></i> Nueva Orden de Compra</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
            <div className="modal-body">
              <div className="form-grid">
                <SearchableDropdown label="Proveedor" icon="fas fa-truck-field" options={supplierOpts} value={supplierId} onChange={setSupplierId} placeholder="Seleccionar proveedor..." required={true} />
                <div className="form-group"><label><i className="fas fa-calendar-day"></i> Fecha Esperada</label><input type="date" value={expectedDate} onChange={(e) => setExpectedDate(e.target.value)} /></div>
              </div>
              <div className="pos-disc-row" style={{ gridTemplateColumns: '2fr 1fr 1fr auto', alignItems: 'end' }}>
                <SearchableDropdown label="Producto" icon="fas fa-box" options={productOpts} value={productId} onChange={setProductId} placeholder="Agregar producto..." />
                <div className="form-group"><label>Cant.</label><input type="number" min="1" step="1" value={qty} onChange={(e) => setQty(e.target.value)} /></div>
                <div className="form-group"><label>Costo Unitario</label><input type="number" min="0" step="0.01" value={unitCost} onChange={(e) => setUnitCost(e.target.value)} /></div>
                <div className="form-group"><label>&nbsp;</label><button type="button" className="btn btn-secondary" onClick={addLine}><i className="fas fa-plus"></i> Agregar</button></div>
              </div>
              {lines.length > 0 && (
                <div className="about-table-wrapper" style={{ marginTop: 12 }}>
                  <table className="about-roles-table">
                    <thead><tr><th>Artículo</th><th>Cant.</th><th>Costo Unitario</th><th>Total Línea</th><th></th></tr></thead>
                    <tbody>
                      {lines.map(l => (
                        <tr key={l.productId}>
                          <td>{l.name}<div className="cell-sub">{l.sku}</div></td><td>{l.qty}</td><td>{money(l.unitCost)}</td><td>{money(l.qty * l.unitCost)}</td>
                          <td><button className="action-icon delete-icon" onClick={() => removeLine(l.productId)}><i className="fas fa-times"></i></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              <p className="stock-onhand-hint" style={{ marginTop: 12 }}>Total OC: <strong>{money(total)}</strong></p>
              <div className="form-group"><label>Notas</label><textarea rows="2" value={notes} onChange={(e) => setNotes(e.target.value)}></textarea></div>
              <div className="form-actions">
                <button type="button" className="btn btn-primary" disabled={saving} onClick={() => submit('ordered')}><i className="fas fa-paper-plane"></i> Guardar y Ordenar</button>
                <button type="button" className="btn btn-secondary" disabled={saving} onClick={() => submit('draft')}><i className="fas fa-floppy-disk"></i> Guardar Borrador</button>
                <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- PO detail + receive ---
    function PoDetailModal({ po, onClose, onReceive }) {
      if (!po) return null;
      const receivable = po.status !== 'received' && po.status !== 'cancelled';
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal modal-lg" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header"><h3><i className="fas fa-file-invoice-dollar"></i> {po.poNumber}</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
            <div className="modal-body">
              <div className="ts-meta" style={{ marginBottom: 12 }}>
                <div className="ts-meta-row"><span>Proveedor:</span><span>{po.supplierName || '-'}</span></div>
                <div className="ts-meta-row"><span>Estado:</span><span>{po.status}</span></div>
                <div className="ts-meta-row"><span>Esperado:</span><span>{po.expectedDate || '-'}</span></div>
                <div className="ts-meta-row"><span>Creado:</span><span>{formatDateForDisplay(po.createdAt)}</span></div>
              </div>
              <div className="about-table-wrapper">
                <table className="about-roles-table">
                  <thead><tr><th>Artículo</th><th>Cant.</th><th>Costo Unitario</th><th>Total Línea</th></tr></thead>
                  <tbody>{(po.items || []).map((it, i) => <tr key={it.sku || i}><td>{it.name}<div className="cell-sub">{it.sku}</div></td><td>{it.qty}</td><td>{money(it.unitCost)}</td><td>{money(it.lineTotal != null ? it.lineTotal : it.qty * it.unitCost)}</td></tr>)}</tbody>
                </table>
              </div>
              <p className="stock-onhand-hint" style={{ marginTop: 12 }}>Total OC: <strong>{money(po.total)}</strong></p>
              {po.notes ? <p style={{ color: '#666', marginTop: 8 }}>{po.notes}</p> : null}
              <div className="form-actions">
                {receivable && <button className="btn btn-success" onClick={() => onReceive(po)}><i className="fas fa-dolly"></i> Recibir en Stock</button>}
                <button className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cerrar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- Purchase Orders View ---
    function PurchaseOrdersView({ user, role }) {
      const [showModal, setShowModal] = useState(false);
      const [viewPo, setViewPo] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);
      const [load, setLoad] = useState('');
      const tableRef = useRef(null);
      const { loading, data, err } = useFetch(() => Promise.all([fbGetPurchaseOrders(), fbGetSuppliers(), fbGetProducts()]), [reloadKey]);
      const pos = useMemo(() => (data && data[0] && data[0].success ? data[0].data : []), [data]);
      const suppliers = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const products = useMemo(() => (data && data[2] && data[2].success ? data[2].data : []), [data]);
      const byId = useMemo(() => pos.reduce((m, p) => (m[p.id] = p, m), {}), [pos]);
      const tableData = useMemo(() => pos.map(p => Object.assign({}, p, { itemCount: (p.items || []).length })), [pos]);
      const reload = () => setReloadKey(k => k + 1);
      const poSummary = useMemo(() => ({
        count: pos.length,
        total: pos.reduce((s, p) => s + Number(p.total || 0), 0),
        open: pos.filter(p => p.status !== 'received' && p.status !== 'cancelled').reduce((s, p) => s + Number(p.total || 0), 0)
      }), [pos]);

      const statusBadge = (s) => {
        const map = { received: 'status-active', ordered: 'type-chip', draft: '', cancelled: 'status-inactive' };
        const cls = map[s] || 'type-chip';
        return `<span class="${cls === 'type-chip' ? 'type-chip' : 'status-badge ' + cls}">${esc(s || 'draft')}</span>`;
      };

      useEffect(() => { if (err || (data && data[0] && !data[0].success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data[0] && data[0].message) || 'Error al cargar OC' }); }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableRef.current;
        if (table) { table.clear().rows.add(tableData).draw(false); }
        else {
          table = $('#poTable').DataTable({
            data: tableData,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            createdRow: (row, d) => { if (d.status === 'received') $(row).addClass('row-ok'); else if (d.status === 'cancelled') $(row).addClass('row-muted'); else $(row).addClass('row-warn'); }, // received=green, cancelled=grey, open=amber
            columns: [
              { data: 'poNumber', title: 'OC #', render: (d, t) => t === 'display' ? '<code>' + esc(d || '') + '</code>' : d },
              { data: 'createdAt', title: 'Fecha', render: (d, t) => t === 'display' ? formatDateForDisplay(d) : d },
              { data: 'supplierName', title: 'Proveedor', render: (d, t) => t === 'display' ? esc(d || '-') : d },
              { data: 'itemCount', title: 'Líneas' },
              { data: 'total', title: 'Total', render: (d, t) => t === 'display' ? money(d) : d },
              { data: 'status', title: 'Estado', render: (d, t) => t === 'display' ? statusBadge(d) : d },
              { data: 'expectedDate', title: 'Esperado', render: (d, t) => t === 'display' ? esc(d || '-') : d },
              { data: null, title: 'Acciones', orderable: false, render: (d, t, row) => `<button class="action-icon edit-icon" data-action="view"><i class="fas fa-eye"></i></button>` + (row.status !== 'received' && row.status !== 'cancelled' ? `<button class="action-icon qr-icon" data-action="receive"><i class="fas fa-dolly"></i></button>` : '') + (role === 'Admin' ? `<button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>` : '') }
            ],
            pageLength: 10, lengthMenu: [[10, 25, 50, -1], [10, 25, 50, 'All']], responsive: true, dom: 'Blfrtip',
            buttons: [{ extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } }, { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } }, { extend: 'print', text: '<i class="fas fa-print"></i> Imprimir', exportOptions: { columns: ':not(:last-child)' } }],
            order: [[1, 'desc']]
          });
          tableRef.current = table;
        }
        $('#poTable').off('click', '.action-icon').on('click', '.action-icon', function () {
          const id = table.row($(this).parents('tr')).data().id;
          const action = $(this).data('action');
          if (action === 'view') setViewPo(byId[id]);
          else if (action === 'receive') doReceive(byId[id]);
          else handleDelete(byId[id]);
        });
      }, [loading, tableData, role]);

      useEffect(() => () => { if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current = null; } catch (e) { } } }, []);

      const handleSave = async (po) => {
        setLoad('Creando OC...');
        const r = await fbCreatePurchaseOrder(po, user);
        setLoad('');
        if (r.success) { setShowModal(false); Swal.fire({ icon: 'success', title: '¡Éxito!', text: r.message, timer: 1800, showConfirmButton: false }); reload(); }
        else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      };

      const doReceive = async (po) => {
        if (!po) return;
        const res = await Swal.fire({ icon: 'question', title: '¿Recibir OC?', text: `¿Registrar ${(po.items || []).length} línea(s) como Entrada y marcar ${po.poNumber} como recibida?`, showCancelButton: true, confirmButtonText: 'Recibir', cancelButtonText: 'Cancelar', input: 'checkbox', inputValue: 1, inputPlaceholder: 'También actualizar costos de productos' });
        if (!res.isConfirmed) return;
        setViewPo(null); setLoad('Recibiendo stock...');
        const r = await fbReceivePurchaseOrder(po, user, !!res.value);
        setLoad('');
        if (r.success) { Swal.fire({ icon: 'success', title: 'Recibido', text: r.message, timer: 1800, showConfirmButton: false }); reload(); }
        else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      };

      const handleDelete = (po) => Swal.fire({ icon: 'warning', title: '¿Eliminar OC?', text: po.poNumber, showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Eliminar', cancelButtonText: 'Cancelar' }).then(async (res) => {
        if (!res.isConfirmed) return; setLoad('Eliminando...'); const r = await fbDeletePurchaseOrder(po.id, po.poNumber, user); setLoad('');
        if (r.success) { Swal.fire({ icon: 'success', text: r.message, timer: 1500, showConfirmButton: false }); reload(); } else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      });

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header"><h2><i className="fas fa-file-invoice-dollar"></i> Órdenes de Compra</h2><div style={{ display: 'flex', gap: '10px' }}><RefreshBtn onClick={reload} /><button className="btn btn-success" disabled={loading} onClick={() => setShowModal(true)}><i className="fas fa-plus"></i> Nueva OC</button></div></div>
          {loading && <TableSkeleton rows={8} columns={8} />}
          <div style={{ display: loading ? 'none' : 'block' }}><table id="poTable" className="display" style={{ width: '100%' }}></table>{pos.length > 0 && <SummaryBar items={[{ label: 'OCs', value: poSummary.count }, { label: 'Valor Total', value: money(poSummary.total) }, { label: 'Abiertas (sin recibir)', value: money(poSummary.open) }]} />}</div>
          {showModal && <PurchaseOrderModal suppliers={suppliers} products={products} onClose={() => setShowModal(false)} onSave={handleSave} />}
          {viewPo && <PoDetailModal po={viewPo} onClose={() => setViewPo(null)} onReceive={doReceive} />}
        </div>
      );
    }

    // --- User Modal (Add/Edit) ---
    function UserModal({ editUser, onClose, onSave }) {
      const [formData, setFormData] = useState({
        name: editUser?.name || '', email: editUser?.email || '', password: '', role: editUser?.role || 'User'
      });
      const [saving, setSaving] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setSaving(true);
        const payload = { name: formData.name, email: formData.email, role: formData.role };
        if (!editUser || formData.password) payload.password = formData.password;
        await onSave(payload);
        setSaving(false); // re-enable on failed save (parent keeps modal open)
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-user-gear"></i> {editUser ? 'Editar' : 'Agregar'} Usuario</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <form onSubmit={submit}>
                <div className="form-grid">
                  <div className="form-group"><label>Nombre *</label><input type="text" value={formData.name} onChange={(e) => setFormData(p => ({ ...p, name: e.target.value }))} required /></div>
                  <div className="form-group"><label>Correo *</label><input type="email" value={formData.email} onChange={(e) => setFormData(p => ({ ...p, email: e.target.value }))} required /></div>
                  <div className="form-group"><label>Contraseña {editUser ? '(dejar en blanco para mantener la actual)' : '*'}</label><input type="password" value={formData.password} onChange={(e) => setFormData(p => ({ ...p, password: e.target.value }))} required={!editUser} /></div>
                  <SearchableDropdown label="Rol" icon="fas fa-user-shield" options={ROLE_OPTS} value={formData.role} onChange={(val) => setFormData(p => ({ ...p, role: val }))} placeholder="Seleccionar rol..." required={true} />
                </div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Guardando...</> : <><i className="fas fa-save"></i> Guardar</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- Users View (Admin only - manages the /users login collection) ---
    function UsersView({ user, role }) {
      const [showModal, setShowModal] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);
      const [load, setLoad] = useState('');
      const tableInstanceRef = useRef(null);

      const { loading, data, err } = useFetch(() => fbGetUsers(), [reloadKey]);
      const [viewUser, setViewUser] = useState(null);
      const users = useMemo(() => (data && data.success ? data.data : []), [data]);
      const reload = () => setReloadKey(k => k + 1);
      const byId = useMemo(() => users.reduce((m, u) => (m[u.id] = u, m), {}), [users]);
      const adminCount = useMemo(() => users.filter(u => u.role === 'Admin').length, [users]);
      const openEdit = useCallback((id) => { setEditingId(id); setShowModal(true); }, []);

      useEffect(() => {
        if (err || (data && !data.success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data.message) || 'Error al cargar usuarios' });
      }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableInstanceRef.current;
        if (table) {
          table.clear().rows.add(users).draw(false);
        } else {
          table = $('#usersTable').DataTable({
            data: users,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            columns: [
              { data: 'name', title: 'Nombre', render: (d, t) => t === 'display' ? esc(d) : d },
              { data: 'email', title: 'Correo', render: (d, t) => t === 'display' ? esc(d) : d },
              { data: 'role', title: 'Rol', render: (d, t) => t === 'display' ? '<span class="role-badge ' + (d === 'Admin' ? 'role-admin' : 'role-emp') + '">' + esc(d) + '</span>' : d },
              { data: null, title: 'Acciones', orderable: false, render: () => `<button class="action-icon" data-action="view" title="Ver"><i class="fas fa-eye"></i></button><button class="action-icon edit-icon" data-action="edit" title="Editar"><i class="fas fa-edit"></i></button><button class="action-icon delete-icon" data-action="delete" title="Eliminar"><i class="fas fa-trash"></i></button>` }
            ],
            pageLength: 10,
            lengthMenu: [[10, 25, 50, -1], [10, 25, 50, 'Todos']],
            responsive: true,
            dom: 'Blfrtip',
            buttons: [
              { extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'print', text: '<i class="fas fa-print"></i> Imprimir', exportOptions: { columns: ':not(:last-child)' } }
            ],
            order: [[0, 'asc']]
          });
          tableInstanceRef.current = table;
        }
        $('#usersTable').off('click', '.action-icon').on('click', '.action-icon', function () {
          const id = table.row($(this).parents('tr')).data().id;
          const act = $(this).data('action');
          if (act === 'view') setViewUser(byId[id]);
          else if (act === 'edit') openEdit(id);
          else handleDelete(byId[id]);
        });
      }, [loading, users]);

      useEffect(() => () => {
        if (tableInstanceRef.current) { try { tableInstanceRef.current.destroy(); tableInstanceRef.current = null; } catch (e) { } }
      }, []);

      const handleSave = async (formData) => {
        setLoad(editingId ? 'Actualizando usuario...' : 'Guardando usuario...');
        const result = editingId ? await fbUpdateUser(editingId, formData, user) : await fbAddUser(formData, user);
        setLoad('');
        if (result.success) {
          setShowModal(false); setEditingId(null);
          Swal.fire({ icon: 'success', title: '¡Éxito!', text: result.message, timer: 2000, showConfirmButton: false });
          reload();
        } else {
          Swal.fire({ icon: 'error', title: 'Error', text: result.message });
        }
      };

      const handleDelete = (u) => {
        if (u.id === user.id || u.email === user.email) return Swal.fire({ icon: 'warning', title: 'No permitido', text: 'No puedes eliminar tu propia cuenta mientras tienes sesión iniciada.' });
        if (u.role === 'Admin' && adminCount <= 1) return Swal.fire({ icon: 'warning', title: 'No permitido', text: 'Debe quedar al menos una cuenta de Administrador.' });
        Swal.fire({ icon: 'warning', title: '¿Eliminar?', text: 'Esta acción no se puede deshacer', showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Eliminar', cancelButtonText: 'Cancelar' }).then(async (result) => {
          if (!result.isConfirmed) return;
          setLoad('Eliminando usuario...');
          const r = await fbDeleteUser(u.id, u.name, user);
          setLoad('');
          if (r.success) { Swal.fire({ icon: 'success', text: r.message, timer: 2000, showConfirmButton: false }); reload(); }
          else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
        });
      };

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header">
            <h2><i className="fas fa-users-cog"></i> Usuarios</h2>
            <div style={{ display: 'flex', gap: '10px' }}><RefreshBtn onClick={reload} /><button className="btn btn-success" onClick={() => { setEditingId(null); setShowModal(true); }}><i className="fas fa-plus"></i> Agregar Usuario</button></div>
          </div>
          {loading && <TableSkeleton rows={5} columns={4} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="usersTable" className="display" style={{ width: '100%' }}></table>
          </div>
          {viewUser && <UserHubModal account={viewUser} onClose={() => setViewUser(null)} />}
          {showModal && <UserModal editUser={byId[editingId]} onClose={() => { setShowModal(false); setEditingId(null); }} onSave={handleSave} />}
        </div>
      );
    }

                  <tr><td>Impuesto de Venta</td><td>Por línea: línea con descuento × tasa de impuesto (tasa del producto, si no la predeterminada). El modo impuesto incluido extrae el impuesto del precio en lugar de sumarlo</td><td>Caja POS, Recibo</td></tr>
                  <tr><td>Total de Venta</td><td>Exclusivo de impuestos: Subtotal − Descuento + Impuestos. Inclusivo de impuestos: Subtotal − Descuento (el impuesto ya está adentro)</td><td>Caja POS, Recibo Térmico</td></tr>

                  <tr><td>Resolución Rápida (Escaneo)</td><td>El código escaneado/escrito se busca en memoria por id, SKU o código de barras (instantáneo) — solo si falla se busca en Firebase</td><td>Ventas QR / POS</td></tr>
                  <tr><td>Deducción de Stock al Vender</td><td>Al pagar se escribe una Salida de Stock por cada línea (motivo: Venta) — el stock solo cambia mediante el libro, nunca directamente</td><td>Caja POS → Libro de Stock</td></tr>

                  <tr><td>Cantidad Retornable</td><td>Cant. Vendida − Σ cant. ya devuelta en esa línea (en devoluciones anteriores) — limita cuánto puede devolverse de nuevo</td><td>Procesar Devolución</td></tr>

                  <tr><td>Tasa de Impuesto (producto)</td><td>% de Impuesto del Producto (si está), si no la tasa por defecto de la Configuración</td><td>Producto (Lo usa luego la caja POS)</td></tr>
                  <tr><td>Visualización de Moneda</td><td>money() agrega el símbolo configurado (Configuración → Moneda e Impuestos); todas las cantidades lo siguen</td><td>Cada cantidad mostrada</td></tr>
                  <tr><td>Categorías</td><td>Cargadas en vivo desde la colección (Configuración), no es lista fija — agrega/elimina para adaptarse al negocio</td><td>Listas y filtros de categorías</td></tr>
                </tbody>

    // --- Settings (Admin) - business profile, currency, tax, receipt text, categories ---
    function SettingsView({ user, role }) {
      const { settings, categories, refreshConfig } = useConfig();
      const [form, setForm] = useState(settings || {});
      const [newCat, setNewCat] = useState('');
      const [saving, setSaving] = useState(false);
      const [load, setLoad] = useState('');

      useEffect(() => { setForm(settings || {}); }, [settings]);
      const upd = (k, v) => setForm(f => Object.assign({}, f, { [k]: v }));

      const save = async () => {
        setSaving(true);
        const payload = {
          businessName: form.businessName || '', address: form.address || '', phone: form.phone || '', email: form.email || '', logoUrl: form.logoUrl || '',
          currencySymbol: form.currencySymbol || '$', currencyCode: form.currencyCode || 'USD',
          taxRate: Number(form.taxRate) || 0, taxInclusive: !!form.taxInclusive,
          invoicePrefix: form.invoicePrefix || 'INV-', lowStockDefault: Number(form.lowStockDefault) || 0,
          receiptHeader: form.receiptHeader || '', receiptFooter: form.receiptFooter || ''
        };
        const r = await fbSaveSettings(payload, user);
        setSaving(false);
        if (r.success) { applySettings(payload); refreshConfig(); Swal.fire({ icon: 'success', title: 'Guardado', text: 'Configuración actualizada', timer: 1600, showConfirmButton: false }); }
        else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      };

      const addCat = async () => {
        const nm = newCat.trim(); if (!nm) return;
        setLoad('Agregando categoría...');
        const r = await fbAddCategory(nm, user); setLoad('');
        if (r.success) { setNewCat(''); refreshConfig(); } else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      };
      const delCat = (c) => Swal.fire({ icon: 'warning', title: '¿Eliminar categoría?', text: c.name, showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Eliminar', cancelButtonText: 'Cancelar' }).then(async (res) => {
        if (!res.isConfirmed) return;
        setLoad('Eliminando...'); const r = await fbDeleteCategory(c.id, c.name, user); setLoad('');
        if (r.success) refreshConfig(); else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
      });

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header">
            <h2><i className="fas fa-gear"></i> Configuración</h2>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Guardando...</> : <><i className="fas fa-save"></i> Guardar Configuración</>}</button>
          </div>

          <LteCard title="Información del Negocio" icon="fa-store">
            <div className="form-grid">
              <div className="form-group"><label>Nombre del Negocio</label><input type="text" value={form.businessName || ''} onChange={(e) => upd('businessName', e.target.value)} /></div>
              <div className="form-group"><label>Teléfono</label><input type="text" value={form.phone || ''} onChange={(e) => upd('phone', e.target.value)} /></div>
              <div className="form-group"><label>Correo Electrónico</label><input type="email" value={form.email || ''} onChange={(e) => upd('email', e.target.value)} /></div>
              <div className="form-group"><label>URL del Logo</label><input type="text" value={form.logoUrl || ''} onChange={(e) => upd('logoUrl', e.target.value)} placeholder="https://..." /></div>
            </div>
            <div className="form-group"><label>Dirección</label><textarea rows="2" value={form.address || ''} onChange={(e) => upd('address', e.target.value)}></textarea></div>
          </LteCard>

          <LteCard title="Moneda e Impuestos" icon="fa-coins">
            <div className="form-grid">
              <div className="form-group"><label>Símbolo de Moneda</label><input type="text" value={form.currencySymbol || ''} onChange={(e) => upd('currencySymbol', e.target.value)} placeholder="$, Rs, ₹, £..." /></div>
              <div className="form-group"><label>Código de Moneda</label><input type="text" value={form.currencyCode || ''} onChange={(e) => upd('currencyCode', e.target.value)} placeholder="USD, PKR, INR..." /></div>
              <div className="form-group"><label>Tasa de Impuesto por Defecto (%)</label><input type="number" step="0.01" min="0" value={form.taxRate ?? ''} onChange={(e) => upd('taxRate', e.target.value)} /></div>
              <div className="form-group"><label>Alerta de Stock Bajo</label><input type="number" step="1" min="0" value={form.lowStockDefault ?? ''} onChange={(e) => upd('lowStockDefault', e.target.value)} /></div>
              <div className="form-group"><label><i className="fas fa-toggle-on"></i> Precios Incluyen Impuestos</label><div><input type="checkbox" className="toggle" checked={!!form.taxInclusive} onChange={(e) => upd('taxInclusive', e.target.checked)} /></div></div>
            </div>
          </LteCard>

          <LteCard title="Recibo / Factura" icon="fa-receipt">
            <div className="form-grid">
              <div className="form-group"><label>Prefijo de Factura</label><input type="text" value={form.invoicePrefix || ''} onChange={(e) => upd('invoicePrefix', e.target.value)} placeholder="INV-" /></div>
            </div>
            <div className="form-group"><label>Encabezado del Recibo</label><textarea rows="2" value={form.receiptHeader || ''} onChange={(e) => upd('receiptHeader', e.target.value)} placeholder="Se muestra arriba de los artículos del recibo"></textarea></div>
            <div className="form-group"><label>Pie del Recibo</label><textarea rows="2" value={form.receiptFooter || ''} onChange={(e) => upd('receiptFooter', e.target.value)} placeholder="Mensaje de agradecimiento"></textarea></div>
          </LteCard>

          <LteCard title="Categorías de Productos" icon="fa-tags">
            <div className="pos-scan-box" style={{ marginBottom: 14 }}>
              <div className="form-group" style={{ flex: 1, marginBottom: 0 }}><label>Nueva Categoría</label><input type="text" value={newCat} onChange={(e) => setNewCat(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addCat(); } }} placeholder="ej. Bebidas" /></div>
              <button className="btn btn-success" onClick={addCat}><i className="fas fa-plus"></i> Agregar</button>
            </div>
            <div className="cat-chip-wrap">
              {categories.length === 0 ? <p style={{ color: '#999' }}>Aún no hay categorías.</p> : categories.map(c => (
                <span className="cat-chip" key={c.id}><i className="fas fa-tag"></i> {c.name}<button onClick={() => delCat(c)} title="Eliminar"><i className="fas fa-times"></i></button></span>
              ))}
            </div>
          </LteCard>
        </div>
      );
    }

    // --- Layout ---

      switch (activeMenu) {
        case 'dashboard': return <DashboardView user={user} role={role} setActiveMenu={setActiveMenu} />;
        case 'pos': return <POSView user={user} role={role} />;
        case 'products': return <ProductsView user={user} role={role} />;
        case 'stock': return <StockView user={user} role={role} />;
        case 'sales-history': return <SalesHistoryView user={user} role={role} />;
        case 'records': return <RecordsView user={user} role={role} />;
        case 'suppliers': return <SuppliersView user={user} role={role} />;
        case 'purchase-orders': return <PurchaseOrdersView user={user} role={role} />;
        case 'expenses': return <ExpensesView user={user} role={role} />;
        case 'users': return <UsersView user={user} role={role} />;

    function Dashboard({ user, role, onLogout }) {
      const [activeMenu, setActiveMenu] = useState(role === 'Admin' ? 'dashboard' : role === 'Vendedor Móvil' ? 'pos' : 'records');
      const [collapsed, setCollapsed] = useState(() => localStorage.getItem('sb_collapsed') === '1');
      const toggleSidebar = () => setCollapsed(c => { localStorage.setItem('sb_collapsed', c ? '0' : '1'); return !c; });
      const { data: logsData } = useFetch(() => fbGetLogs(), [activeMenu]);
      const allNotifs = useMemo(() => (logsData && logsData.success ? logsData.data.slice(0, 5).map(l => ({ text: `${l.action}: ${l.detail}`, icon: 'fa-bell', ts: l.ts || l.createdAt })) : []), [logsData]);
      const [readTs, setReadTs] = useState(() => { try { return localStorage.getItem('notif_read_ts') || ''; } catch(e) { return ''; } });
      const [cleared, setCleared] = useState(false);
      const notifs = cleared ? [] : allNotifs;
      const unreadCount = useMemo(() => {
        if (cleared) return 0;
        if (!readTs) return notifs.length;
        return notifs.filter(n => n.ts && n.ts > readTs).length;
      }, [notifs, readTs, cleared]);
      const handleNotifRead = useCallback(() => {
        const now = new Date().toISOString();
        setReadTs(now);
        localStorage.setItem('notif_read_ts', now);
      }, []);
      const handleNotifClear = useCallback(() => {
        setCleared(true);
        const now = new Date().toISOString();
        setReadTs(now);
        localStorage.setItem('notif_read_ts', now);
      }, []);
      // reset cleared when new data arrives
      useEffect(() => { setCleared(false); }, [logsData]);

      // app config (settings + categories) loaded once here, shared via context; mirrored into CFG for non-component code
      const [cfgKey, setCfgKey] = useState(0);
      const { data: cfgData } = useFetch(() => Promise.all([fbGetSettings(), fbGetCategories()]), [cfgKey]);
      const settings = useMemo(() => (cfgData && cfgData[0] && cfgData[0].success ? cfgData[0].data : {}), [cfgData]);
      const categories = useMemo(() => (cfgData && cfgData[1] && cfgData[1].success ? cfgData[1].data : []), [cfgData]);
      useEffect(() => { if (settings && Object.keys(settings).length) applySettings(settings); }, [settings]);
      const refreshConfig = useCallback(() => setCfgKey(k => k + 1), []);

      const titles = { dashboard: 'Panel', pos: 'Ventas QR', products: 'Productos', stock: 'Entrada/Salida Stock', 'sales-history': 'Historial de Ventas', records: 'Clientes', suppliers: 'Proveedores', 'purchase-orders': 'Órdenes de Compra', expenses: 'Gastos', users: 'Usuarios', settings: 'Configuración', logs: 'Registro de Actividad', about: 'Acerca de' };
      const icons = { dashboard: 'fa-chart-line', pos: 'fa-cash-register', products: 'fa-boxes-stacked', stock: 'fa-dolly', 'sales-history': 'fa-receipt', records: 'fa-address-book', suppliers: 'fa-truck-field', 'purchase-orders': 'fa-file-invoice-dollar', expenses: 'fa-money-bill-trend-up', users: 'fa-users-cog', settings: 'fa-gear', logs: 'fa-history', about: 'fa-info-circle' };
      const [mobileOpen, setMobileOpen] = useState(false);
      const isMobile = typeof window !== 'undefined' && window.innerWidth <= 768;
      const handleMenuChange = (menu) => { setActiveMenu(menu); setMobileOpen(false); };
      const handleToggle = () => { if (isMobile || window.innerWidth <= 768) { setMobileOpen(o => !o); } else { toggleSidebar(); } };

      // Build mobile tabs based on role
      const mobileTabs = useMemo(() => {
        const tabs = [];
        tabs.push({ key: 'pos', icon: 'fa-cash-register', label: 'Ventas' });
        tabs.push({ key: 'products', icon: 'fa-boxes-stacked', label: 'Productos' });
        tabs.push({ key: 'records', icon: 'fa-address-book', label: 'Clientes' });
        tabs.push({ key: 'sales-history', icon: 'fa-receipt', label: 'Historial' });
        return tabs;
      }, [role]);

      return (
        <ConfigContext.Provider value={{ settings, categories, refreshConfig }}>
          <div className="app-container">
            <div className={'sidebar-backdrop' + (mobileOpen ? ' show' : '')} onClick={() => setMobileOpen(false)}></div>
            <Sidebar activeMenu={activeMenu} setActiveMenu={handleMenuChange} role={role} user={user} onLogout={onLogout} collapsed={collapsed} mobileOpen={mobileOpen} />
            <div className="main-content">
              <Navbar icon={icons[activeMenu]} title={titles[activeMenu]} userName={user?.name} role={role} notifs={notifs} unreadCount={unreadCount} onNotifRead={handleNotifRead} onNotifClear={handleNotifClear} onLogout={onLogout} setActiveMenu={handleMenuChange} toggleSidebar={handleToggle} />
              <MainContent activeMenu={activeMenu} user={user} role={role} setActiveMenu={handleMenuChange} />
            </div>
            <div className="mobile-bottom-bar">
              {mobileTabs.map(t => (
                <button key={t.key} className={'mob-tab' + (activeMenu === t.key ? ' active' : '')} onClick={() => setActiveMenu(t.key)}>
                  <i className={'fas ' + t.icon}></i>
                  <span>{t.label}</span>
                </button>
              ))}
              <button className="mob-tab" onClick={() => setMobileOpen(true)}>
                <i className="fas fa-bars"></i>
                <span>Más</span>
              </button>
            </div>
          </div>
        </ConfigContext.Provider>
      );
    }

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [userRole, setUserRole] = useState(null);
      const [checkingSession, setCheckingSession] = useState(true);

      useEffect(() => {
        const saved = localStorage.getItem('fb_user');
        if (saved) {
          try { const u = JSON.parse(saved); setIsLoggedIn(true); setCurrentUser(u); setUserRole(u.role); } catch (e) { }
        }
        setCheckingSession(false);
      }, []);

      const handleLogin = (user, role) => {
        localStorage.setItem('fb_user', JSON.stringify(user));
        setIsLoggedIn(true); setCurrentUser(user); setUserRole(role);
      };
      const handleLogout = () => {
        localStorage.removeItem('fb_user');
        setIsLoggedIn(false); setCurrentUser(null); setUserRole(null);
      };

      if (checkingSession) return <div className="login-container"><div className="login-box"><i className="fas fa-spinner fa-spin" style={{ fontSize: '40px', color: 'var(--navy-primary)' }}></i></div></div>;

      return <div>{!isLoggedIn ? <LoginPage onLogin={handleLogin} /> : <Dashboard user={currentUser} role={userRole} onLogout={handleLogout} />}</div>;
    }

    class ErrorBoundary extends React.Component {
      state = { err: null };
      static getDerivedStateFromError(err) { return { err }; }
      componentDidCatch(err) { console.error('ui crash', err); }
      render() {
        if (this.state.err) return (
          <div className="login-container"><div className="login-box">
            <i className="fas fa-triangle-exclamation" style={{ fontSize: 40, color: 'var(--danger)' }}></i>
            <h2>Algo salió mal</h2>
            <button className="btn btn-primary" onClick={() => location.reload()}><i className="fas fa-rotate"></i> Recargar</button>
          </div></div>
        );
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>

</html>
