    }

    .nav-dd {
      position: relative;
    }

    .nav-dd-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      min-width: 230px;
      background: #fff;
      border: 1px solid #e8ecf1;
      border-radius: 3px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .14);
      padding: 8px;
      display: none;
      z-index: 300;
    }

    .nav-dd.open .nav-dd-menu {
      display: block;
    }

    .nav-dd-menu a,
    .nav-dd-menu button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      border-radius: 3px;
      font-size: 14px;
      color: #444;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
    }

    .nav-dd-menu a:hover,
    .nav-dd-menu button:hover {
      background: #eef1f5;
      color: var(--navy-primary);
    }

    .nav-dd-menu .dd-badge {
      background: var(--navy-accent);
      color: #fff;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .nav-dd-head {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 6px;
    }

    .nav-dd-head .dd-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy-primary);
    }

    .nav-dd-head .dd-sub {
      font-size: 12.5px;
      color: var(--navy-accent);
      margin-top: 2px;
    }

    .nav-dd-foot {
      padding: 8px 4px 2px;
    }

    .nav-dd-foot .btn-block {
      width: 100%;
      background: var(--navy-primary);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 3px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-dd-foot .btn-block:hover {
      background: var(--navy-hover);
    }

    .nav-notif {
      display: flex;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 3px;
      font-size: 13px;
      color: #444;
    }

    .nav-notif:hover {
      background: #f5f7fa;
    }

    .nav-notif i {
      color: var(--navy-accent);
      margin-top: 2px;
    }

    @media(max-width:768px) {
      .nav-crumb {
        display: none;
      }

      .nav-welcome {
        display: none;
      }

      .nav-page-title {
        font-size: 16px;
      }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      /* Sidebar: off-canvas overlay */
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        z-index: 1100;
        transform: translateX(-100%);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
      }
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      .sidebar.collapsed {
        width: 280px;
        transform: translateX(-100%);
      }
      .sidebar.collapsed.mobile-open {
        transform: translateX(0);
      }
      .sidebar.collapsed .sidebar-brand-name,
      .sidebar.collapsed .sidebar-user-info,
      .sidebar.collapsed .sidebar-menu-title,
      .sidebar.collapsed .sidebar-menu span,
      .sidebar.collapsed .sidebar-logout span {
        display: block;
      }
      .sidebar.collapsed .sidebar-menu button,
      .sidebar.collapsed .sidebar-logout button {
        justify-content: flex-start;
      }
      /* Sidebar backdrop */
      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 1050;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }
      .sidebar-backdrop.show {
        display: block;
        animation: fadeIn .25s;
      }
      @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

      /* Main content full width */
      .main-content {
        padding: 12px 10px 80px 10px;
      }

      /* Navbar compact */
      .navbar {
        padding: 8px 10px;
        margin-bottom: 10px;
        border-radius: 10px;
        gap: 4px;
      }
      .nav-page-title { font-size: 15px; gap: 6px; }
      .nav-page-title i { font-size: 14px; }
      .nav-btn { width: 36px; height: 36px; font-size: 15px; }
      .nav-avatar { width: 32px; height: 32px; }

      /* Data section tighter */
      .data-section {
        padding: 14px 12px;
        border-radius: 10px;
      }
      .section-header {
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      .section-header h2 {
        font-size: 16px;
        gap: 8px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .dashboard-grid-3,
      .dashboard-grid-2 {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      /* Modal full screen on mobile */
      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }
      .modal {
        width: 100%;
        max-width: 100%;
        max-height: 92vh;
        border-radius: 16px 16px 0 0;
        animation: slideUp .3s ease;
      }
      @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
      .modal-header {
        padding: 16px 18px;
        border-radius: 16px 16px 0 0;
      }
      .modal-header h3 { font-size: 16px; }
      .modal-body {
        padding: 18px 16px;
      }

      /* Filters - collapsible & compact */
      .filters-section {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 14px;
      }
      .filters-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .filters-header {
        flex-direction: row;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        cursor: pointer;
      }
      .filters-header h3 { font-size: 15px; margin: 0; }
      .filter-group label { font-size: 12px; }

      .about-header {
        flex-direction: column;
        text-align: center;
      }
      .developer-info {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .developer-links {
        justify-content: center;
      }

      /* Form inputs - bigger touch targets */
      input,
      select,
      textarea {
        font-size: 16px !important;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        font-size: 16px !important;
        padding: 12px 14px;
        border-radius: 8px;
      }
      .filter-input {
        font-size: 16px !important;
        border-radius: 8px;
        padding: 10px 12px;
      }
      .searchable-dropdown-input {
        font-size: 16px !important;
        border-radius: 8px;
      }

      /* Buttons - bigger touch targets */
      .btn {
        padding: 12px 18px;
        border-radius: 8px;
        font-size: 14px;
        min-height: 44px;
      }
      .btn-sm {
        padding: 10px 14px;
        min-height: 40px;
      }

      /* Stat cards */
      .stat-card {
        padding: 16px;
        border-radius: 10px;
      }
      .stat-card:hover {
        transform: none;
      }

      /* POS area */
      .pos-scan-actions {
        flex-wrap: wrap;
        gap: 6px;
      }
      .pos-scan-box {
        flex-direction: column;
      }

      /* DataTables compact */
      table.dataTable thead th {
        padding: 10px 8px !important;
        font-size: 12px;
      }
      table.dataTable tbody td {
        padding: 10px 8px !important;
        font-size: 13px;
      }
      .dt-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .dt-button {
        padding: 8px 12px !important;
        font-size: 12px !important;
        margin-right: 0 !important;
        border-radius: 6px !important;
      }

      /* Summary bar horizontal scroll */
      .summary-bar {
        flex-wrap: wrap;
        gap: 8px;
      }

      /* Camera modal */
      .pos-camera-frame {
        border-radius: 12px;
        overflow: hidden;
      }

      /* Bottom tab bar for mobile */
      .mobile-bottom-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #fff;
        border-top: 1px solid #e0e4e8;
        box-shadow: 0 -2px 12px rgba(0,0,0,.08);
        z-index: 900;
        padding: 4px 0;
        padding-bottom: max(4px, env(safe-area-inset-bottom));
      }
      .mob-tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 6px 2px;
        border: none;
        background: none;
        color: #8c96a3;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: color .2s;
        -webkit-tap-highlight-color: transparent;
      }
      .mob-tab i {
        font-size: 18px;
        transition: transform .2s;
      }
      .mob-tab.active {
        color: var(--navy-accent);
      }
      .mob-tab.active i {
        transform: scale(1.15);
      }

      /* Hide login box extra padding */
      .login-box {
        padding: 30px 24px;
        border-radius: 16px;
      }
    }

    /* Desktop: hide mobile-only elements */
    @media (min-width: 769px) {
      .mobile-bottom-bar { display: none !important; }
      .sidebar-backdrop { display: none !important; }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Products - qr icon + sku chip */
    .action-icon.qr-icon {
      color: var(--navy-accent);
    }

    .action-icon.qr-icon:hover {
      background: rgba(0, 116, 217, 0.1);
      transform: scale(1.15);
    }

    #productsTable code {
      background: #f0f4f8;
      color: var(--navy-primary);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }

    /* Stock In/Out */
    .stock-btns {
      display: flex;
      gap: 10px;
    }

    .stock-onhand-hint {
      font-size: 13px;
      color: #666;
      margin: 0 0 20px;
    }

    /* POS / QR Sales */
    .pos-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .pos-grid {
        grid-template-columns: 1fr;
      }
    }

    .pos-scan-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .pos-scan-box .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .pos-scan-input {
      font-size: 18px !important;
      padding: 16px !important;
      border: 2px solid var(--navy-accent) !important;
    }

    .pos-name-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #d5e3f2;
      border-top: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 8px 24px rgba(0,31,63,.15);
      z-index: 1000;
      max-height: 320px;
      overflow-y: auto;
    }

    .pos-suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f4f8;
      transition: background .15s;
    }

    .pos-suggestion-item:last-child { border-bottom: none; }

    .pos-suggestion-item:hover {
      background: #eef4fb;
    }

    .pos-sug-name {
      font-weight: 600;
      color: var(--navy-primary);
      font-size: 14px;
    }

    .pos-sug-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .pos-sug-meta span:last-child {
      font-weight: 600;
      color: var(--navy-accent);
    }

    .pos-scan-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cat-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef4fb;
      color: var(--navy-primary);
      border: 1px solid #d5e3f2;
      border-radius: 3px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .cat-chip button {
      background: none;
      border: none;
      color: #9aa7b4;
      cursor: pointer;
      padding: 0 2px;
      font-size: 13px;
    }

    .cat-chip button:hover {
      color: var(--danger);
    }

    .prod-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid #e0e6ed;
      background: #fff;
      display: inline-block;
      vertical-align: middle;
    }

    .prod-thumb.empty {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #c3ccd6;
      font-size: 16px;
    }

    .prod-img-preview {
      text-align: center;
      margin-bottom: 12px;
    }

    .prod-img-preview img {
      max-height: 120px;
      max-width: 100%;
      border-radius: 4px;
      border: 1px solid #e0e6ed;
      object-fit: contain;
    }

    .cell-sub {
      font-size: 11px;
      color: #8a97a5;
      margin-top: 2px;
    }

    .type-chip {
      display: inline-block;
      background: #eef4fb;
      color: var(--navy-accent);
      border: 1px solid #d5e3f2;
      border-radius: 3px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 600;
    }

    .stock-cost-check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      cursor: pointer;
    }

    .stock-cost-check input {
      width: auto;
    }

    .pos-cart-list {
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }

    .pos-cart-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
    }

    .pos-cart-row:last-child {
      border-bottom: none;
    }

    .pos-cart-row .pi-name {
      flex: 1;
      min-width: 0;
    }

    .pos-cart-row .pi-name strong {
      display: block;
      font-size: 14px;
      color: #333;
    }

    .pos-cart-row .pi-name small {
      color: #888;
      font-size: 12px;
    }

    .pos-qty-ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pos-qty-ctrl button {
      width: 28px;
      height: 28px;
      border: 1px solid #d0d0d0;
      background: #fff;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      touch-action: manipulation;
    }

    .pos-qty-ctrl button:hover {
      background: #f0f0f0;
    }

    .pos-qty-ctrl span {
      min-width: 24px;
      text-align: center;
      font-weight: 600;
    }

    .pos-line-total {
      width: 90px;
      text-align: right;
      font-weight: 600;
      color: var(--navy-primary);
    }

    .pos-remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
    }

    .pos-summary {
      background: #f8f9fa;
      border-radius: 3px;
      padding: 18px;
      align-self: flex-start;
      position: sticky;
      top: 0;
    }

    .pos-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      color: #555;
    }

    .pos-summary-row.grand {
      border-top: 2px solid var(--navy-primary);
      margin-top: 8px;
      padding-top: 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy-primary);
    }

    .pos-summary .form-group {
      margin-bottom: 10px;
    }

    .pos-disc-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pos-checkout-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .pos-checkout-actions .btn {
      flex: 1;
    }

    .pos-empty {
      text-align: center;
      color: #999;
      padding: 40px 20px;
    }

    .pos-empty i {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      color: #ccc;
    }

    .pos-camera-frame {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    #pos-qr-reader {
      width: 100%;
    }

    /* Thermal receipt slip (POS checkout, 80mm) */
    .thermal-slip-print {
      width: 80mm;
      max-width: 80mm;
      margin: 20px auto;
      padding: 10px 8px;
      background: #fff;
      color: #000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.5;
      border: 1px dashed #ccc;
    }

    .ts-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .ts-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 4px;
    }

    .ts-app-name {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
    }

    .ts-sub {
      font-size: 11px;
    }

    .ts-meta {
      margin-bottom: 6px;
    }

    .ts-meta-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .ts-divider {
      border-top: 1px dashed #000;
      margin: 8px 0;
    }

    .ts-item-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 3px 0;
    }

    .ts-item-head {
      font-weight: 700;
      border-bottom: 1px dashed #000;
      padding-bottom: 4px;
      margin-bottom: 4px;
    }

    .ts-item-name-col {
      flex: 1;
      min-width: 0;
    }

    .ts-item-name {
      word-break: break-word;
    }

    .ts-item-sku {
      display: block;
      font-size: 10px;
      color: #444;
    }

    .ts-item-calc {
      white-space: nowrap;
      text-align: right;
      flex-shrink: 0;
    }

    .ts-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }

    .ts-total {
      font-weight: 700;
      font-size: 13px;
      border-top: 1px solid #000;
      margin-top: 4px;
      padding-top: 6px;
    }

    .ts-footer {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
    }

    .ts-footer .ts-cashier {
      margin-top: 4px;
    }

    .thermal-slip-modal-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .thermal-slip-actions {
      justify-content: center;
    }

    /* Reorder Report (print only) */
    .reorder-report-print {
      display: none;
    }

    .rr-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .rr-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

    .rr-title {
      font-size: 20px;
      font-weight: 700;
      color: #000;
    }

    .rr-sub {
      font-size: 12px;
      color: #444;
    }

    .rr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .rr-table th,
    .rr-table td {
      padding: 8px 10px;
      border: 1px solid #999;
      text-align: left;
    }

    .rr-table th {
      background: #eee;
      font-weight: 700;
    }

    /* Print - QR labels + thermal receipt + reorder report share one print pass (only one overlay is ever mounted at a time) */
    .qr-print-stage {
      display: none;
    }

    .qr-label-print {
      display: none;
    }

    @media print {
      body * {
        visibility: hidden !important;
      }

      .qr-print-stage,
      .qr-print-stage *,
      .thermal-slip-print,
      .thermal-slip-print *,
      .reorder-report-print,
      .reorder-report-print * {
        visibility: visible !important;
      }

      .qr-print-stage {
        display: flex !important;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 3mm;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 4mm;
        background: #fff;
      }

      .qr-label-print {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 50mm;
        height: 30mm;
        border: 1px dashed #999;
        text-align: center;
        page-break-inside: avoid;
        background: #fff;
      }

      .qr-label-print canvas {
        width: 22mm !important;
        height: 22mm !important;
      }

      .qr-label-print .qr-label-sku {
        font-size: 9px;
        font-weight: 700;
        margin-top: 1mm;
        letter-spacing: .5px;
        color: #000;
      }

      .thermal-slip-print {
        position: absolute;
        top: 0;
        left: 0;
        width: 80mm;
        max-width: 80mm;
        margin: 0;
        border: none;
      }

      .reorder-report-print {
        display: block !important;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 10mm;
        background: #fff;
      }
    }

    @page {
      size: 80mm auto;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    // firebase init - RTDB only, no auth/apiKey needed for basic read/write
    firebase.initializeApp({ databaseURL: 'https://sistema-pos-906e1-default-rtdb.firebaseio.com/' });
    window.db = firebase.database();

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
    function nowIso() { return new Date().toISOString(); }

    // seed demo login + sample records once, first run only
    async function seedDemoData() {
      const usersSnap = await db.ref('users').once('value');
      if (!usersSnap.exists()) {
        await db.ref('users').set({
          u1: { email: 'admin@demo.com', password: 'admin123', role: 'Admin', name: 'Admin User' },
          u2: { email: 'user1@demo.com', password: 'user123', role: 'User', name: 'User 1' }
        });
      }
      const recSnap = await db.ref('records').once('value');
      if (!recSnap.exists()) {
        const cats = ['Electronics', 'Clothing', 'Food', 'Services', 'Other'];
        const recs = {};
        for (let i = 1; i <= 6; i++) {
          const d = new Date(); d.setMonth(d.getMonth() - (6 - i));
          recs['r' + i] = {
            name: 'Customer ' + i, email: 'customer' + i + '@demo.com', phone: '0300' + String(1000000 + i),
            category: cats[(i - 1) % cats.length], amount: i * 100, active: i % 2 === 0,
            notes: 'Sample note for record ' + i, addedBy: 'admin@demo.com', createdAt: d.toISOString()
          };
        }
        await db.ref('records').set(recs);
      }
      const setSnap = await db.ref('settings').once('value');
      if (!setSnap.exists()) {
        await db.ref('settings').set({
          businessName: 'My Business', currencySymbol: '$', currencyCode: 'USD', taxRate: 0, taxInclusive: false,
          invoicePrefix: 'INV-', lowStockDefault: 5, receiptHeader: '', receiptFooter: 'Thank you for your purchase!',
          address: '', phone: '', email: '', logoUrl: ''
        });
      }
      const catSnap = await db.ref('categories').once('value');
      if (!catSnap.exists()) {
        const cats = ['Electronics', 'Clothing', 'Food', 'Services', 'Other'];
        const obj = {}; cats.forEach((c, i) => obj['c' + (i + 1)] = { name: c, createdAt: nowIso() });
        await db.ref('categories').set(obj);
      }
    }
    seedDemoData();

    function tErr(msg) {
      if (!msg) return 'Error desconocido';
      const s = String(msg);
      if (s.includes('permission_denied')) return 'Permiso denegado. No tienes acceso a estos datos.';
      if (s.includes('network error') || s.includes('network_error')) return 'Error de red. Verifica tu conexión.';
      if (s.includes('Invalid email')) return 'Correo inválido';
      return s;
    }

    async function fbLogin(email, password) {
      try {
        const snap = await db.ref('users').orderByChild('email').equalTo(email).once('value');
        const val = snap.val();
        if (!val) return { success: false, message: 'Correo o contraseña inválidos' };
        const entry = Object.entries(val)[0];
        const id = entry[0], user = entry[1];
        if (user.password !== password) return { success: false, message: 'Correo o contraseña inválidos' };
        return { success: true, data: { id: id, email: user.email, name: user.name, role: user.role } };
      } catch (e) { return { success: false, message: 'Error de conexión: ' + tErr(e.message) }; }
    }

    async function fbGetRecords() {
      try {
        const snap = await db.ref('records').once('value');
        const val = snap.val() || {};
        return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    async function fbLogActivity(action, user, detail) {
      await db.ref('activity_logs').push({ action: action, detail: detail, user: (user && (user.name || user.email)) || 'System', ts: nowIso() });
    }

    // business settings - single object at /settings
    async function fbGetSettings() {
      try { const snap = await db.ref('settings').once('value'); return { success: true, data: snap.val() || {} }; }
      catch (e) { return { success: false, message: tErr(e.message), data: {} }; }
    }
    async function fbSaveSettings(data, user) {
      try { await db.ref('settings').update(data); await fbLogActivity('Actualizar Configuración', user, 'Configuración del negocio actualizada'); return { success: true, message: 'Configuración guardada' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // categories - data-driven now (was a hardcoded enum)
    async function fbGetCategories() {
      try { const snap = await db.ref('categories').once('value'); const val = snap.val() || {}; return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) }; }
      catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }
    async function fbAddCategory(name, user) {
      try {
        const nm = String(name || '').trim();
        if (!nm) return { success: false, message: 'El nombre de la categoría es obligatorio' };
        const dupe = await db.ref('categories').orderByChild('name').equalTo(nm).once('value');
        if (dupe.exists()) return { success: false, message: 'Esa categoría ya existe' };
        const ref = await db.ref('categories').push({ name: nm, createdAt: nowIso() });
        await fbLogActivity('Agregar Categoría', user, nm);
        return { success: true, message: 'Categoría agregada', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbDeleteCategory(id, name, user) {
      try { await db.ref('categories/' + id).remove(); await fbLogActivity('Eliminar Categoría', user, name); return { success: true, message: 'Categoría eliminada' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // customers live in /records (repurposed) - POS reads the same node via fbGetCustomers
    async function fbAddRecord(data, user) {
      try {
        const ref = await db.ref('records').push(Object.assign({}, data, { addedBy: user.email, createdAt: nowIso() }));
        await fbLogActivity('Agregar Cliente', user, data.name);
        return { success: true, message: 'Cliente agregado', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbUpdateRecord(id, data, user) {
      try {
        await db.ref('records/' + id).update(data);
        await fbLogActivity('Actualizar Cliente', user, data.name);
        return { success: true, message: 'Cliente actualizado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbDeleteRecord(id, name, user) {
      try {
        await db.ref('records/' + id).remove();
        await fbLogActivity('Eliminar Cliente', user, name);
        return { success: true, message: 'Cliente eliminado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    const fbGetCustomers = fbGetRecords;

    function toggleActive(id, val) {
      db.ref('records/' + id).update({ active: !!val }).then(function () {
        if (window.refreshRecords) window.refreshRecords();
      }).catch(function (e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); });
    }
    window.toggleActive = toggleActive;

    async function fbGetLogs() {
      try {
        const snap = await db.ref('activity_logs').limitToLast(20).once('value');
        const val = snap.val() || {};
        const arr = Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); });
        arr.reverse();
        return { success: true, data: arr };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    // products - sku via the one transaction() in the app, low-contention sequential counter
    async function fbGenerateSku() {
      try {
        const res = await db.ref('counters/products').transaction(function (cur) { return (cur || 0) + 1; });
        if (!res.committed) return { success: false, message: 'No se pudo reservar el SKU, intente de nuevo' };
        const n = res.snapshot.val();
        return { success: true, data: 'SKU-' + String(n).padStart(5, '0') };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // atomic sequential invoice number - prefix from settings
    async function fbGenerateInvoiceNo() {
      try {
        const res = await db.ref('counters/sales').transaction(function (cur) { return (cur || 0) + 1; });
        if (!res.committed) return { success: false, message: 'No se pudo reservar el número de factura, intente de nuevo' };
        return { success: true, data: (CFG.invoicePrefix || 'INV-') + String(res.snapshot.val()).padStart(5, '0') };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbGetProducts() {
      try {
        const snap = await db.ref('products').once('value');
        const val = snap.val() || {};
        return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    async function fbAddProduct(data, user) {
      try {
        const skuRes = await fbGenerateSku();
        if (!skuRes.success) return { success: false, message: skuRes.message };
        const ref = await db.ref('products').push(Object.assign({}, data, { sku: skuRes.data, addedBy: user.email, createdAt: nowIso() }));
        await fbLogActivity('Agregar Producto', user, data.name + ' (' + skuRes.data + ')');
        return { success: true, message: 'Producto agregado (' + skuRes.data + ')', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // sku is immutable - data here never includes it, so update() can't touch it
    async function fbUpdateProduct(id, data, user) {
      try {
        await db.ref('products/' + id).update(data);
        await fbLogActivity('Actualizar Producto', user, data.name);
        return { success: true, message: 'Producto actualizado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbDeleteProduct(id, name, user) {
      try {
        await db.ref('products/' + id).remove();
        await fbLogActivity('Eliminar Producto', user, name);
        return { success: true, message: 'Producto eliminado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // stock ledger - qty on hand always derived live from this list, never stored
    async function fbGetStockMovements() {
      try {
        const snap = await db.ref('stock_movements').once('value');
        const val = snap.val() || {};
        return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    // productName passed separately (not persisted) just to build the log detail string
    async function fbAddStockMovement(data, productName, user) {
      try {
        const ref = await db.ref('stock_movements').push(Object.assign({}, data, { performedBy: user.email, createdAt: nowIso() }));
        const action = data.type === 'in' ? 'Entrada de Stock' : 'Salida de Stock';
        await fbLogActivity(action, user, data.qty + ' x ' + productName + (data.reason ? ' (' + data.reason + ')' : ''));
        return { success: true, message: action + ' registrado', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbDeleteStockMovement(id, detail, user) {
      try {
        await db.ref('stock_movements/' + id).remove();
        await fbLogActivity('Eliminar Mov. Stock', user, detail);
        return { success: true, message: 'Registro de stock eliminado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // resolve a scanned/typed code to a product - try it as a firebase key first (qr encodes the push key), fall back to sku match
    async function fbFindProductByCode(code) {
      const trimmed = String(code || '').trim();
      if (!trimmed) return { success: false, message: 'Código vacío' };
      try {
        const byKeySnap = await db.ref('products/' + trimmed).once('value');
        if (byKeySnap.exists()) return { success: true, data: Object.assign({ id: trimmed }, byKeySnap.val()) };
      } catch (e) { /* not a valid key - fall through to sku match */ }
      try {
        const bySkuSnap = await db.ref('products').orderByChild('sku').equalTo(trimmed).once('value');
        const val = bySkuSnap.val();
        if (val) { const entry = Object.entries(val)[0]; return { success: true, data: Object.assign({ id: entry[0] }, entry[1]) }; }
      } catch (e) { /* fall through to barcode match */ }
      try {
        const byBarSnap = await db.ref('products').orderByChild('barcode').equalTo(trimmed).once('value');
        const val = byBarSnap.val();
        if (val) { const entry = Object.entries(val)[0]; return { success: true, data: Object.assign({ id: entry[0] }, entry[1]) }; }
        return { success: false, message: 'Producto no encontrado para el código: ' + trimmed };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // checkout - creates the sale, deducts stock via the ledger (1 out entry per line), logs activity
    async function fbCreateSale(sale, user) {
      try {
        const invRes = await fbGenerateInvoiceNo();
        const invoiceNo = invRes.success ? invRes.data : '';
        const payload = Object.assign({ status: 'completed' }, sale, { invoiceNo, cashier: user.name, createdAt: nowIso() });
        const ref = await db.ref('sales').push(payload);
        const saleId = ref.key;
        await Promise.all(sale.items.map(function (it) {
          return fbAddStockMovement({ productId: it.productId, type: 'out', qty: it.qty, reason: 'Venta', reference: saleId }, it.name, user);
        }));
        const totalStr = CFG.currency + Number(sale.total || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        await fbLogActivity('Venta', user, invoiceNo + ' — Total ' + totalStr + ' (' + sale.items.length + ' artículo' + (sale.items.length === 1 ? '' : 's') + ')');
        return { success: true, message: 'Venta completada', id: saleId, data: Object.assign({ id: saleId }, payload) };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbGetSales() {
      try {
        const snap = await db.ref('sales').once('value');
        const val = snap.val() || {};
        const arr = Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); });
        arr.sort(function (a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
        return { success: true, data: arr };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    async function fbGetReturns() {
      try {
        const snap = await db.ref('returns').once('value');
        const val = snap.val() || {};
        return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    // returns credit stock back via the same ledger (type:'in', reason:'Return', reference: saleId), never edits the original sale
    async function fbCreateReturn(saleId, items, user) {
      try {
        const totalRefund = items.reduce(function (s, it) { return s + it.lineTotal; }, 0);
        const ref = await db.ref('returns').push({ saleId: saleId, items: items, totalRefund: totalRefund, processedBy: user.email, createdAt: nowIso() });
        await Promise.all(items.map(function (it) {
          return fbAddStockMovement({ productId: it.productId, type: 'in', qty: it.qty, reason: 'Devolución', reference: saleId }, it.name, user);
        }));
        const refundStr = '$' + Number(totalRefund || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        await fbLogActivity('Devolución', user, 'Reembolso ' + refundStr + ' (' + items.length + ' artículo' + (items.length === 1 ? '' : 's') + ') de venta ' + saleId);
        return { success: true, message: 'Devolución procesada', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // bulk receiving - reuses fbAddStockMovement per line, one shared reason/reference across the whole batch
    async function fbBulkStockIn(lines, user) {
      try {
        await Promise.all(lines.map(function (l) {
          return fbAddStockMovement({ productId: l.productId, type: 'in', qty: l.qty, reason: l.reason, reference: l.reference }, l.name, user);
        }));
        const ref = lines[0] && lines[0].reference ? ' (' + lines[0].reference + ')' : '';
        await fbLogActivity('Recepción Masiva', user, lines.length + ' producto' + (lines.length === 1 ? '' : 's') + ' recibido' + (lines.length === 1 ? '' : 's') + ref);
        return { success: true, message: 'Stock recibido (' + lines.length + ' artículo' + (lines.length === 1 ? '' : 's') + ')' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // suppliers - vendor directory + payables opening balance
    async function fbGetSuppliers() {
      try { const snap = await db.ref('suppliers').once('value'); const val = snap.val() || {}; return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) }; }
      catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }
    async function fbAddSupplier(data, user) {
      try {
        const ref = await db.ref('suppliers').push(Object.assign({}, data, { addedBy: user.email, createdAt: nowIso() }));
        await fbLogActivity('Agregar Proveedor', user, data.name);
        return { success: true, message: 'Proveedor agregado', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbUpdateSupplier(id, data, user) {
      try { await db.ref('suppliers/' + id).update(data); await fbLogActivity('Actualizar Proveedor', user, data.name || id); return { success: true, message: 'Proveedor actualizado' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbDeleteSupplier(id, name, user) {
      try { await db.ref('suppliers/' + id).remove(); await fbLogActivity('Eliminar Proveedor', user, name); return { success: true, message: 'Proveedor eliminado' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // expenses - operating costs feeding the P&L
    async function fbGetExpenses() {
      try { const snap = await db.ref('expenses').once('value'); const val = snap.val() || {}; const arr = Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }); arr.sort(function (a, b) { return new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt); }); return { success: true, data: arr }; }
      catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }
    async function fbAddExpense(data, user) {
      try {
        const ref = await db.ref('expenses').push(Object.assign({}, data, { addedBy: user.email, createdAt: nowIso() }));
        await fbLogActivity('Agregar Gasto', user, (data.category || 'Gasto') + ' ' + CFG.currency + (Number(data.amount) || 0));
        return { success: true, message: 'Gasto agregado', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbUpdateExpense(id, data, user) {
      try { await db.ref('expenses/' + id).update(data); await fbLogActivity('Actualizar Gasto', user, (data.category || 'Gasto')); return { success: true, message: 'Gasto actualizado' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbDeleteExpense(id, detail, user) {
      try { await db.ref('expenses/' + id).remove(); await fbLogActivity('Eliminar Gasto', user, detail); return { success: true, message: 'Gasto eliminado' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // purchase orders - create -> (later) receive into the stock ledger
    async function fbGeneratePoNumber() {
      try {
        const res = await db.ref('counters/pos').transaction(function (cur) { return (cur || 0) + 1; });
        if (!res.committed) return { success: false, message: 'No se pudo reservar el número de OC, intente de nuevo' };
        return { success: true, data: 'PO-' + String(res.snapshot.val()).padStart(5, '0') };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbGetPurchaseOrders() {
      try { const snap = await db.ref('purchase_orders').once('value'); const val = snap.val() || {}; const arr = Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }); arr.sort(function (a, b) { return new Date(b.createdAt) - new Date(a.createdAt); }); return { success: true, data: arr }; }
      catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }
    async function fbCreatePurchaseOrder(po, user) {
      try {
        const poRes = await fbGeneratePoNumber();
        const poNumber = poRes.success ? poRes.data : '';
        const payload = Object.assign({ status: 'ordered' }, po, { poNumber, createdBy: user.email, createdAt: nowIso() });
        const ref = await db.ref('purchase_orders').push(payload);
        await fbLogActivity('Crear OC', user, poNumber + ' — ' + (po.supplierName || '') + ' (' + CFG.currency + (Number(po.total) || 0) + ')');
        return { success: true, message: 'OC ' + poNumber + ' creada', id: ref.key, data: Object.assign({ id: ref.key }, payload) };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    // receive: one Stock In per line (reason Purchase, carries unit cost + supplier), then flag the PO received
    async function fbReceivePurchaseOrder(po, user, updateCost) {
      try {
        await Promise.all((po.items || []).map(function (it) {
          return fbAddStockMovement({ productId: it.productId, type: 'in', qty: it.qty, reason: 'Purchase', reference: po.poNumber, unitCost: Number(it.unitCost) || 0, supplier: po.supplierName || null, notes: 'PO receipt' }, it.name, user);
        }));
        if (updateCost) await Promise.all((po.items || []).filter(function (it) { return Number(it.unitCost) > 0; }).map(function (it) { return fbUpdateProduct(it.productId, { cost: Number(it.unitCost) }, user); }));
        await db.ref('purchase_orders/' + po.id).update({ status: 'received', receivedAt: nowIso() });
        await fbLogActivity('Recibir OC', user, po.poNumber + ' (' + (po.items || []).length + ' línea' + ((po.items || []).length === 1 ? '' : 's') + ')');
        return { success: true, message: 'OC recibida — stock actualizado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbUpdatePurchaseOrder(id, data, user) {
      try { await db.ref('purchase_orders/' + id).update(data); await fbLogActivity('Actualizar OC', user, data.poNumber || id); return { success: true, message: 'OC actualizada' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }
    async function fbDeletePurchaseOrder(id, poNumber, user) {
      try { await db.ref('purchase_orders/' + id).remove(); await fbLogActivity('Eliminar OC', user, poNumber); return { success: true, message: 'OC eliminada' }; }
      catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbGetUsers() {
      try {
        const snap = await db.ref('users').once('value');
        const val = snap.val() || {};
        return { success: true, data: Object.entries(val).map(function (e) { return Object.assign({ id: e[0] }, e[1]); }) };
      } catch (e) { return { success: false, message: tErr(e.message), data: [] }; }
    }

    async function fbAddUser(data, user) {
      try {
        const existing = await db.ref('users').orderByChild('email').equalTo(data.email).once('value');
        if (existing.exists()) return { success: false, message: 'Ya existe un usuario con este correo' };
        const ref = await db.ref('users').push({ name: data.name, email: data.email, password: data.password, role: data.role });
        await fbLogActivity('Agregar Usuario', user, data.name + ' (' + data.email + ')');
        return { success: true, message: 'Usuario agregado', id: ref.key };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    // data.password is only present when the caller actually changed it - update() merges, so omitting it keeps the old one
    async function fbUpdateUser(id, data, user) {
      try {
        if (data.email) {
          const existing = await db.ref('users').orderByChild('email').equalTo(data.email).once('value');
          const val = existing.val() || {};
          const clash = Object.keys(val).some(function (k) { return k !== id; });
          if (clash) return { success: false, message: 'Otro usuario ya utiliza este correo' };
        }
        await db.ref('users/' + id).update(data);
        await fbLogActivity('Actualizar Usuario', user, data.name || id);
        return { success: true, message: 'Usuario actualizado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }

    async function fbDeleteUser(id, name, user) {
      try {
        await db.ref('users/' + id).remove();
        await fbLogActivity('Eliminar Usuario', user, name);
        return { success: true, message: 'Usuario eliminado' };
      } catch (e) { return { success: false, message: tErr(e.message) }; }
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback, useDeferredValue } = React;

    // app-wide config mirror - lets non-component code (money(), datatable renders, exports) read settings synchronously
    const CFG = { currency: '$', currencyCode: 'USD', taxRate: 0, taxInclusive: false, invoicePrefix: 'INV-', lowStockDefault: 5, receiptHeader: '', receiptFooter: '¡Gracias por su compra!', business: { name: 'Mi Negocio', address: '', phone: '', email: '' }, logoUrl: '' };
    function applySettings(s) {
      if (!s) return;
      CFG.currency = s.currencySymbol || CFG.currency;
      CFG.currencyCode = s.currencyCode || CFG.currencyCode;
      CFG.taxRate = Number(s.taxRate) || 0;
      CFG.taxInclusive = !!s.taxInclusive;
      CFG.invoicePrefix = s.invoicePrefix || CFG.invoicePrefix;
      CFG.lowStockDefault = (s.lowStockDefault != null && s.lowStockDefault !== '') ? Number(s.lowStockDefault) : CFG.lowStockDefault;
      CFG.receiptHeader = s.receiptHeader || '';
      CFG.receiptFooter = s.receiptFooter || CFG.receiptFooter;
      CFG.logoUrl = s.logoUrl || '';
      CFG.business = { name: s.businessName || CFG.business.name, address: s.address || '', phone: s.phone || '', email: s.email || '' };
    }
    // settings + categories flow down through here; refreshConfig re-pulls after an edit
    const ConfigContext = React.createContext({ settings: {}, categories: [], refreshConfig: () => { } });
    const useConfig = () => React.useContext(ConfigContext);
    // category dropdown options - live list from DB, falls back to the seed defaults while loading
    const useCategoryOpts = () => { const { categories } = useConfig(); return useMemo(() => categories.length ? categories.map(c => ({ value: c.name, label: c.name })) : CATEGORY_OPTS, [categories]); };

    const LOGO_URL = 'https://i.pinimg.com/736x/c1/dc/41/c1dc4134eba1fa9c9cff468c801c2c2e.jpg';

    const CATEGORY_OPTS = [
      { value: 'Electrónica', label: 'Electrónica' },
      { value: 'Ropa', label: 'Ropa' },
      { value: 'Alimentos', label: 'Alimentos' },
      { value: 'Servicios', label: 'Servicios' },
      { value: 'Otros', label: 'Otros' }
    ];
    const ACTIVE_OPTS = [{ value: '1', label: 'Activo' }, { value: '0', label: 'Inactivo' }];
    const LOW_STOCK_OPTS = [{ value: '1', label: 'Solo Stock Bajo' }];
    const ROLE_OPTS = [{ value: 'Admin', label: 'Administrador' }, { value: 'User', label: 'Usuario' }, { value: 'Vendedor Móvil', label: 'Vendedor Móvil' }];
    const STATUS_OPTS = [{ value: 'active', label: 'Activo' }, { value: 'discontinued', label: 'Descontinuado' }];
    const PRODUCT_STATUS_FILTER = [{ value: 'active', label: 'Solo Activos' }, { value: 'discontinued', label: 'Solo Descontinuados' }];
    const CUSTOMER_TYPE_OPTS = [{ value: 'Retail', label: 'Minorista' }, { value: 'Wholesale', label: 'Mayorista' }, { value: 'Lead', label: 'Prospecto' }, { value: 'VIP', label: 'VIP' }];
    const EXPENSE_CATEGORY_OPTS = [{ value: 'Rent', label: 'Alquiler' }, { value: 'Utilities', label: 'Servicios Públicos' }, { value: 'Salaries', label: 'Salarios' }, { value: 'Supplies', label: 'Suministros' }, { value: 'Marketing', label: 'Marketing' }, { value: 'Transport', label: 'Transporte' }, { value: 'Maintenance', label: 'Mantenimiento' }, { value: 'Fees & Taxes', label: 'Impuestos y Tasas' }, { value: 'Other', label: 'Otros' }];

    // restock target: explicit reorder qty > (max stock − on hand) > (reorder level × 2 − on hand); never below 0
    function suggestedReorder(p, qtyOnHand) {
      const rl = Number(p.reorderLevel || 0), max = Number(p.maxStock || 0), rq = Number(p.reorderQty || 0);
      if (rq > 0) return rq;
      if (max > 0) return Math.max(0, max - qtyOnHand);
      return Math.max(0, rl * 2 - qtyOnHand);
    }

    const PAYMENT_OPTS = [{ value: 'Cash', label: 'Efectivo' }, { value: 'Card', label: 'Tarjeta' }, { value: 'Mobile', label: 'Móvil / Billetera' }, { value: 'Bank', label: 'Transferencia' }, { value: 'Credit', label: 'Crédito (sin pagar)' }];
    const DISCOUNT_TYPE_OPTS = [{ value: 'flat', label: 'Monto' }, { value: 'percent', label: 'Porcentaje %' }];
    const REASON_IN_OPTS = [{ value: 'Purchase', label: 'Compra' }, { value: 'Return', label: 'Devolución' }, { value: 'Adjustment', label: 'Ajuste' }, { value: 'Opening Stock', label: 'Stock Inicial' }, { value: 'Production', label: 'Producción' }, { value: 'Transfer In', label: 'Transferencia Entrada' }];
    const REASON_OUT_OPTS = [{ value: 'Sale', label: 'Venta' }, { value: 'Damage', label: 'Daño' }, { value: 'Loss / Theft', label: 'Pérdida / Robo' }, { value: 'Adjustment', label: 'Ajuste' }, { value: 'Expired', label: 'Vencido' }, { value: 'Transfer Out', label: 'Transferencia Salida' }];

    // single source for POS money math: order-level discount + per-line tax (product rate or settings default), tax-inclusive aware.
    // also snapshots cost per line for accurate profit later (product cost can change after the sale).
    function computeSaleTotals(cart, prodById, discount) {
      const subtotal = cart.reduce((s, l) => s + l.qty * l.price, 0);
      let discAmt = 0;
      if (discount && Number(discount.value) > 0) discAmt = discount.type === 'percent' ? subtotal * Math.min(Number(discount.value), 100) / 100 : Math.min(Number(discount.value), subtotal);
      const factor = subtotal > 0 ? (subtotal - discAmt) / subtotal : 1; // spread order discount across lines
      let taxTotal = 0;
      const lines = cart.map(l => {
        const p = prodById[l.productId] || {};
        const rate = (p.taxRate != null && p.taxRate !== '' ? Number(p.taxRate) : Number(CFG.taxRate)) || 0;
        const lineTotal = l.qty * l.price;
        const net = lineTotal * factor;
        const lineTax = CFG.taxInclusive ? (net - net / (1 + rate / 100)) : (net * rate / 100);
        taxTotal += lineTax;
        return { productId: l.productId, name: l.name, sku: l.sku, qty: l.qty, price: l.price, cost: Number(p.cost) || 0, taxRate: rate, lineTotal: round2(lineTotal), lineTax: round2(lineTax) };
      });
      const grand = CFG.taxInclusive ? (subtotal - discAmt) : (subtotal - discAmt + taxTotal);
      return { subtotal: round2(subtotal), discount: round2(discAmt), tax: round2(taxTotal), grand: round2(grand), lines };
    }

    const money = (n) => CFG.currency + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
    const formatDateForDisplay = (iso) => new Date(iso).toLocaleString('es-MX', { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const getTimeAgo = (iso) => {
      const s = Math.floor((new Date() - new Date(iso)) / 1000);
      if (s < 60) return s + 's atrás';
      if (s < 3600) return Math.floor(s / 60) + 'm atrás';
      if (s < 86400) return Math.floor(s / 3600) + 'h atrás';
      return Math.floor(s / 86400) + 'd atrás';
    };

    // qty on hand = running total of a product's stock ledger (in adds, out subtracts) - never stored
    function computeQtyOnHand(productId, movements) {
      return (movements || []).reduce((qty, m) => m.productId === productId ? qty + (m.type === 'in' ? m.qty : -m.qty) : qty, 0);
    }

    // how much of a given sale line has already been returned - prevents returning more than was sold
    function computeReturnedQty(saleId, productId, returns) {
      return (returns || []).reduce((qty, r) => r.saleId === saleId ? qty + (r.items || []).filter(it => it.productId === productId).reduce((s, it) => s + it.qty, 0) : qty, 0);
    }

    // build an instant lookup for POS - normalized id/sku/barcode -> product (avoids a firebase round-trip per scan)
    function buildCodeIndex(products) {
      const m = new Map();
      (products || []).forEach(p => {
        [p.id, p.sku, p.barcode].forEach(k => { if (k) m.set(String(k).trim().toLowerCase(), p); });
        // also index by name (lowercased) for name-based search
        if (p.name) m.set(String(p.name).trim().toLowerCase(), p);
      });
      return m;
    }

    // fuzzy name search - returns products whose name contains the query
    function searchProductsByName(products, query) {
      if (!query || query.length < 2) return [];
      const q = query.toLowerCase();
      return (products || []).filter(p => p.name && p.name.toLowerCase().includes(q)).slice(0, 8);
    }


    // race-safe data loading - token guard drops stale + post-unmount results
    function useFetch(fn, deps = []) {
      const [s, setS] = useState({ loading: true, data: null, err: null });
      const tok = useRef(0);
      useEffect(() => {
        const id = ++tok.current;
        setS(p => ({ ...p, loading: true }));
        Promise.resolve(fn())
          .then(r => { if (id === tok.current) setS({ loading: false, data: r, err: null }); })
          .catch(e => { if (id === tok.current) setS({ loading: false, data: null, err: e }); });
        return () => { tok.current++; };
      }, deps);
      return s;
    }

    // --- SearchableDropdown (single-select) ---
    const DropdownItem = React.memo(function DropdownItem({ option, selected, onSelect }) {
      return <div className={`searchable-dropdown-item ${selected ? 'selected' : ''}`} onClick={() => onSelect(option)}>{option.label}</div>;
    });

    function SearchableDropdown({ options, value, onChange, placeholder = 'Select...', label, icon, required = false }) {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState('');
      const dropdownRef = useRef(null);
      const selectedLabel = options.find(o => o.value === value)?.label || '';
      const optIdx = useMemo(() => options.map(o => ({ o, k: o.label.toLowerCase() })), [options]);
      const dq = useDeferredValue(search).toLowerCase();
      const filtered = useMemo(() => optIdx.filter(x => x.k.includes(dq)).map(x => x.o), [optIdx, dq]);

      useEffect(() => {
        const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) { setIsOpen(false); setSearch(''); } };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleSelect = useCallback((option) => { onChange(option.value); setIsOpen(false); setSearch(''); }, [onChange]);
      const handleInputChange = (e) => { setSearch(e.target.value); if (!isOpen) setIsOpen(true); };
      const handleInputClick = () => { setIsOpen(!isOpen); if (!isOpen) setSearch(''); };

      return (
        <div className="form-group">
          {label && <label>{icon && <i className={icon}></i>} {label}{required && ' *'}</label>}
          <div className="searchable-dropdown" ref={dropdownRef}>
            <input type="text" className="searchable-dropdown-input" placeholder={placeholder}
              value={isOpen ? search : selectedLabel} onChange={handleInputChange} onClick={handleInputClick} required={required && !value} />
            <span className={`searchable-dropdown-arrow ${isOpen ? 'open' : ''}`}><i className="fas fa-chevron-down"></i></span>
            {isOpen && (
              <div className="searchable-dropdown-list">
                <div className={`searchable-dropdown-item ${!value ? 'selected' : ''}`} onClick={() => handleSelect({ value: '', label: '' })}>{placeholder}</div>
                {filtered.length > 0 ? filtered.map((option, idx) => <DropdownItem key={idx} option={option} selected={value === option.value} onSelect={handleSelect} />)
                  : <div className="searchable-dropdown-item no-results">Sin resultados</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- SearchableMultiSelect (multi-select, ready for future multi-attribute fields) ---
    const MultiItem = React.memo(function MultiItem({ option, checked, onToggle }) {
      return <div className={`searchable-dropdown-item ${checked ? 'checked' : ''}`} onClick={() => onToggle(option.value)}>{option.label}</div>;
    });

    function SearchableMultiSelect({ options, values = [], onChange, placeholder = 'Select...', label, icon, required = false }) {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState('');
      const dropdownRef = useRef(null);
      const sel = useMemo(() => new Set(values), [values]);
      const selectedLabels = useMemo(() => options.filter(o => sel.has(o.value)), [options, sel]);
      const optIdx = useMemo(() => options.map(o => ({ o, k: o.label.toLowerCase() })), [options]);
      const dq = useDeferredValue(search).toLowerCase();
      const filtered = useMemo(() => optIdx.filter(x => x.k.includes(dq)).map(x => x.o), [optIdx, dq]);

      useEffect(() => {
        const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) { setIsOpen(false); setSearch(''); } };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const toggleOption = useCallback((optionValue) => {
        const newValues = sel.has(optionValue) ? values.filter(v => v !== optionValue) : [...values, optionValue];
        onChange(newValues);
      }, [values, sel, onChange]);
      const removeTag = (optionValue) => onChange(values.filter(v => v !== optionValue));

      return (
        <div className="form-group">
          {label && <label>{icon && <i className={icon}></i>} {label}{required && ' *'}</label>}
          {selectedLabels.length > 0 && (
            <div className="searchable-multi-tags">
              {selectedLabels.map((o, i) => <span key={i} className="searchable-multi-tag">{o.label}
                <button type="button" className="searchable-multi-tag-remove" onClick={() => removeTag(o.value)}><i className="fas fa-times"></i></button></span>)}
            </div>
          )}
          <div className="searchable-dropdown" ref={dropdownRef}>
            <input type="text" className="searchable-dropdown-input" placeholder={values.length > 0 ? `${values.length} selected` : placeholder}
              value={isOpen ? search : ''} onChange={(e) => { setSearch(e.target.value); if (!isOpen) setIsOpen(true); }}
              onClick={() => { setIsOpen(!isOpen); if (!isOpen) setSearch(''); }} required={required && values.length === 0} />
            <span className={`searchable-dropdown-arrow ${isOpen ? 'open' : ''}`}><i className="fas fa-chevron-down"></i></span>
            {isOpen && (
              <div className="searchable-dropdown-list">
                {filtered.length > 0 ? filtered.map((option, idx) => <MultiItem key={idx} option={option} checked={sel.has(option.value)} onToggle={toggleOption} />)
                  : <div className="searchable-dropdown-item no-results">Sin resultados</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // thin top loading bar - non-blocking, replaces the old center popup
    function TopLoadingBar() { return <div className="top-load"><div className="top-load-bar"></div></div>; }

    // reusable summary footer strip for tables - items: [{label, value}]
    function SummaryBar({ items }) {
      return <div className="table-summary">{items.filter(Boolean).map((it, i) => <div className="table-summary-item" key={i}><div className="ts-label">{it.label}</div><div className="ts-value">{it.value}</div></div>)}</div>;
    }

    // small refresh icon button for list headers
    function RefreshBtn({ onClick }) {
      return <button className="btn btn-secondary btn-refresh" onClick={onClick} title="Refresh"><i className="fas fa-rotate"></i></button>;
    }

    // ===== Action-Column Hub: reusable tabbed View modal + per-entity 360 hubs =====
    const HubField = ({ label, value }) => <div className="hub-field"><span className="hf-label">{label}</span><span className="hf-value">{value === 0 ? '0' : (value || '-')}</span></div>;
    const HubKpis = ({ items }) => <div className="hub-kpis">{items.map((it, i) => <div className="hub-kpi" key={i}><div className="k-label">{it.label}</div><div className="k-value">{it.value}</div></div>)}</div>;

    // reverse-chron activity feed from logs matching a term (name/email)
    function HubTimeline({ logs, match }) {
      const m = String(match || '').toLowerCase();
      const rows = (logs || []).filter(l => !m || (`${l.detail || ''} ${l.user || ''}`).toLowerCase().includes(m));
      if (!rows.length) return <div className="hub-empty">No activity recorded.</div>;
      return <ul className="hub-timeline">{rows.map(l => <li key={l.id}><span className="tl-icon"><i className="fas fa-clock-rotate-left"></i></span><div className="tl-body"><strong>{l.action}</strong> — {l.detail}<div className="tl-when">{l.user} · {getTimeAgo(l.ts)}</div></div></li>)}</ul>;
    }

    // tabbed view-hub modal - tabs: [{id,label,icon,content}], header = identity card + kpis
    function TabbedModal({ title, icon, header, tabs, onClose }) {
      const [active, setActive] = useState(tabs[0] && tabs[0].id);
      const cur = tabs.find(t => t.id === active) || tabs[0];
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header"><h3><i className={`fas ${icon}`}></i> {title}</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
            <div className="modal-body">
              {header}
              <div className="modal-tabs">{tabs.map(t => <button key={t.id} className={`modal-tab ${active === t.id ? 'active' : ''}`} onClick={() => setActive(t.id)}><i className={`fas ${t.icon}`}></i> {t.label}</button>)}</div>
              <div>{cur && cur.content}</div>
            </div>
          </div>
        </div>
      );
    }

    // Customer 360 - profile + this customer's sales + timeline
    function CustomerHubModal({ customer, onClose }) {
      const { loading, data } = useFetch(() => Promise.all([fbGetSales(), fbGetLogs()]), []);
      const sales = useMemo(() => (data && data[0] && data[0].success ? data[0].data.filter(s => s.customerId === customer.id) : []), [data, customer.id]);
      const logs = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const spent = sales.reduce((a, s) => a + Number(s.total || 0), 0);
      const header = (
        <>
          <div className="hub-id-card"><div className="hub-avatar"><i className="fas fa-user-tag"></i></div><div><div className="hub-name">{customer.name}</div><div className="hub-sub">{customer.customerType || 'Retail'}{customer.company ? ' · ' + customer.company : ''}</div></div></div>
          <HubKpis items={[{ label: 'Saldo', value: money(customer.amount) }, { label: 'Pedidos', value: sales.length }, { label: 'Total Gastado', value: money(spent) }, { label: 'Límite Crédito', value: money(customer.creditLimit) }]} />
        </>
      );
      const tabs = [
        { id: 'overview', label: 'Resumen', icon: 'fa-circle-info', content: <div><HubField label="Teléfono" value={customer.phone} /><HubField label="Email" value={customer.email} /><HubField label="Ciudad" value={customer.city} /><HubField label="País" value={customer.country} /><HubField label="Grupo" value={customer.category} /><HubField label="Asignado a" value={customer.assignedTo} /><HubField label="Puntos" value={customer.loyaltyPoints} /><HubField label="Etiquetas" value={customer.tags} /><HubField label="Notas" value={customer.notes} /></div> },
        { id: 'sales', label: 'Ventas', icon: 'fa-receipt', content: loading ? <div className="hub-empty">Cargando…</div> : (sales.length ? <table className="hub-mini-table"><thead><tr><th>Factura</th><th>Fecha</th><th>Total</th><th>Pago</th></tr></thead><tbody>{sales.map(s => <tr key={s.id}><td>{s.invoiceNo || String(s.id).slice(-6).toUpperCase()}</td><td>{formatDateForDisplay(s.createdAt)}</td><td>{money(s.total)}</td><td>{s.paymentMethod || '-'}</td></tr>)}</tbody></table> : <div className="hub-empty">Sin ventas para este cliente.</div>) },
        { id: 'timeline', label: 'Historial', icon: 'fa-stream', content: loading ? <div className="hub-empty">Cargando…</div> : <HubTimeline logs={logs} match={customer.name} /> }
      ];
      return <TabbedModal title={customer.name} icon="fa-user-tag" header={header} tabs={tabs} onClose={onClose} />;
    }

    // Product hub - details + stock movement ledger + sales history
    function ProductHubModal({ product, onClose }) {
      const { loading, data } = useFetch(() => Promise.all([fbGetStockMovements(), fbGetSales()]), []);
      const moves = useMemo(() => (data && data[0] && data[0].success ? data[0].data.filter(m => m.productId === product.id) : []), [data, product.id]);
      const allSales = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const qty = computeQtyOnHand(product.id, moves);
      const soldLines = useMemo(() => allSales.flatMap(s => (s.items || []).filter(it => it.productId === product.id).map(it => ({ id: s.id + it.productId, when: s.createdAt, customer: s.customerName, qty: it.qty, price: it.price }))), [allSales, product.id]);
      const soldQty = soldLines.reduce((a, l) => a + Number(l.qty || 0), 0);
      const margin = Number(product.price) > 0 ? Math.round((Number(product.price) - Number(product.cost || 0)) / Number(product.price) * 100) : 0;
      const header = (
        <>
          <div className="hub-id-card"><div className="hub-avatar"><i className="fas fa-box"></i></div><div><div className="hub-name">{product.name}</div><div className="hub-sub">SKU {product.sku}{product.category ? ' · ' + product.category : ''}</div></div></div>
          <HubKpis items={[{ label: 'Disponible', value: qty }, { label: 'Valor Stock', value: money(qty * (Number(product.cost) || 0)) }, { label: 'Vendido', value: soldQty }, { label: 'Margen', value: margin + '%' }]} />
        </>
      );
      const tabs = [
        { id: 'details', label: 'Detalles', icon: 'fa-circle-info', content: <div><HubField label="Precio" value={money(product.price)} /><HubField label="Costo" value={money(product.cost)} /><HubField label="Código" value={product.barcode} /><HubField label="Marca" value={product.brand} /><HubField label="Unidad" value={product.unit} /><HubField label="Nivel Reorden" value={product.reorderLevel} /><HubField label="Ubicación" value={product.location} /><HubField label="Estado" value={product.status || 'active'} /></div> },
        { id: 'stock', label: 'Movimientos Stock', icon: 'fa-dolly', content: loading ? <div className="hub-empty">Cargando…</div> : (moves.length ? <table className="hub-mini-table"><thead><tr><th>Fecha</th><th>Tipo</th><th>Cant</th><th>Razón</th></tr></thead><tbody>{moves.map(m => <tr key={m.id}><td>{formatDateForDisplay(m.createdAt)}</td><td>{m.type === 'in' ? 'ENTRADA' : 'SALIDA'}</td><td>{m.qty}</td><td>{m.reason || '-'}</td></tr>)}</tbody></table> : <div className="hub-empty">Sin movimientos de stock.</div>) },
