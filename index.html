    // --- Records View (DataTable CRUD) ---
    function RecordsView({ user, role }) {
      const [showModal, setShowModal] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);
      const [filters, setFilters] = useState({ dateFrom: '', dateTo: '', active: '', addedBy: '', customerType: '' });
      const [load, setLoad] = useState('');
      const tableInstanceRef = useRef(null);
      const searchFnRef = useRef(null); // our own global-search predicate - removed by identity, never blind-pop another view's
      const [viewCust, setViewCust] = useState(null);

      const { loading, data, err } = useFetch(() => fbGetRecords(), [reloadKey]);
      const records = useMemo(() => (data && data.success ? data.data : []), [data]);
      const reload = () => setReloadKey(k => k + 1);
      window.refreshRecords = reload;

      const byId = useMemo(() => records.reduce((m, r) => (m[r.id] = r, m), {}), [records]);
      const uniqueUsers = useMemo(() => [...new Set(records.map(r => r.addedBy).filter(Boolean))], [records]);
      const openEdit = useCallback((id) => { setEditingId(id); setShowModal(true); }, []);

      useEffect(() => {
        if (err || (data && !data.success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data.message) || 'Error al cargar los clientes' });
      }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableInstanceRef.current;
        if (table) {
          table.clear().rows.add(records).draw(false);
        } else {
          table = $('#recordsTable').DataTable({
            data: records,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            createdRow: (row, d) => { if (!d.active) $(row).addClass('row-muted'); }, // inactive customers dimmed
            columns: [
              { data: 'id', title: 'ID', render: (d, t) => t === 'display' ? d.slice(-6).toUpperCase() : d },
              { data: 'name', title: 'Nombre', render: (d, t, row) => t === 'display' ? esc(d) + (row.company ? `<div class="cell-sub">${esc(row.company)}</div>` : '') : d },
              { data: 'phone', title: 'Teléfono', render: (d, t) => t === 'display' ? esc(d || '') : d },
              { data: 'customerType', title: 'Tipo', render: (d, t) => t === 'display' ? '<span class="type-chip">' + esc(d || 'Minorista') + '</span>' : d },
              { data: 'category', title: 'Grupo', render: (d, t) => t === 'display' ? esc(d || '') : d },
              { data: 'amount', title: 'Saldo', render: (d, t) => t === 'display' ? money(d) : d },
              { data: 'active', title: 'Activo', render: (d, t, row) => t === 'display' ? `<input type="checkbox" ${d ? 'checked' : ''} class="toggle" onchange="toggleActive('${row.id}', this.checked ? 1 : 0)">` : d },
              { data: 'createdAt', title: 'Creado', render: (d, t) => t === 'display' ? formatDateForDisplay(d) : d },
              { data: null, title: 'Acciones', orderable: false, render: () => `<button class="action-icon" data-action="view" title="Ver"><i class="fas fa-eye"></i></button><button class="action-icon edit-icon" data-action="edit" title="Editar"><i class="fas fa-edit"></i></button>` + (role === 'Admin' ? `<button class="action-icon delete-icon" data-action="delete" title="Eliminar"><i class="fas fa-trash"></i></button>` : '') }
            ],
            pageLength: 10,
            lengthMenu: [[10, 25, 50, -1], [10, 25, 50, 'All']],
            responsive: true,
            dom: 'Blfrtip',
            buttons: [
              { extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'print', text: '<i class="fas fa-print"></i> Imprimir', exportOptions: { columns: ':not(:last-child)' } }
            ],
            order: [[7, 'desc']]
          });
          tableInstanceRef.current = table;
        }
        $('#recordsTable').off('click', '.action-icon').on('click', '.action-icon', function () {
          const id = table.row($(this).parents('tr')).data().id;
          const act = $(this).data('action');
          if (act === 'view') setViewCust(byId[id]);
          else if (act === 'edit') openEdit(id);
          else handleDelete(byId[id]);
        });
      }, [loading, records, role]);

      useEffect(() => () => {
        const ext = $.fn.dataTable.ext.search;
        const i = ext.indexOf(searchFnRef.current); if (i !== -1) ext.splice(i, 1); // stop the filter leaking into other views' tables
        if (tableInstanceRef.current) { try { tableInstanceRef.current.destroy(); tableInstanceRef.current = null; } catch (e) { } }
      }, []);

      const applyFilters = () => {
        if (!tableInstanceRef.current) return;
        const dt = tableInstanceRef.current;
        const ext = $.fn.dataTable.ext.search;
        const prev = ext.indexOf(searchFnRef.current); if (prev !== -1) ext.splice(prev, 1); // replace our own predicate only
        const fn = (settings, dataRow, dataIndex) => {
          const rec = records[dataIndex];
          if (!rec) return true;
          const created = new Date(rec.createdAt);
          const from = filters.dateFrom ? new Date(filters.dateFrom) : null;
          const to = filters.dateTo ? new Date(filters.dateTo + 'T23:59:59') : null;
          if (from && created < from) return false;
          if (to && created > to) return false;
          if (filters.active !== '' && Boolean(rec.active) !== (filters.active === '1')) return false;
          if (filters.addedBy && rec.addedBy !== filters.addedBy) return false;
          if (filters.customerType && (rec.customerType || 'Minorista') !== filters.customerType) return false;
          return true;
        };
        searchFnRef.current = fn; ext.push(fn);
        dt.draw();
      };

      const clearFilters = () => {
        setFilters({ dateFrom: '', dateTo: '', active: '', addedBy: '', customerType: '' });
        const ext = $.fn.dataTable.ext.search;
        const i = ext.indexOf(searchFnRef.current); if (i !== -1) ext.splice(i, 1);
        searchFnRef.current = null;
        if (tableInstanceRef.current) tableInstanceRef.current.draw();
      };

      useEffect(() => { if (tableInstanceRef.current && records.length > 0) applyFilters(); }, [filters, records]);

      const handleSave = async (formData) => {
        setLoad(editingId ? 'Actualizando registro...' : 'Guardando registro...');
        const result = editingId ? await fbUpdateRecord(editingId, formData, user) : await fbAddRecord(formData, user);
        setLoad('');
        if (result.success) {
          setShowModal(false); setEditingId(null);
          Swal.fire({ icon: 'success', title: '¡Éxito!', text: result.message, timer: 2000, showConfirmButton: false });
          reload();
        } else {
          Swal.fire({ icon: 'error', title: 'Error', text: result.message });
        }
      };

      const handleDelete = (record) => {
        Swal.fire({ icon: 'warning', title: '¿Eliminar?', text: 'Esta acción no se puede deshacer', showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Eliminar', cancelButtonText: 'Cancelar' }).then(async (result) => {
          if (!result.isConfirmed) return;
          setLoad('Eliminando registro...');
          const r = await fbDeleteRecord(record.id, record.name, user);
          setLoad('');
          if (r.success) { Swal.fire({ icon: 'success', text: r.message, timer: 2000, showConfirmButton: false }); reload(); }
          else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
        });
      };

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header">
            <h2><i className="fas fa-address-book"></i> Clientes</h2>
            <div style={{ display: 'flex', gap: '10px' }}><RefreshBtn onClick={reload} /><button className="btn btn-success" onClick={() => { setEditingId(null); setShowModal(true); }}><i className="fas fa-plus"></i> Agregar Cliente</button></div>
          </div>
          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3><i className="fas fa-filter"></i> Filtros</h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Limpiar Todo</button>
              </div>
              <div className="filters-grid">
                <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Fecha Desde</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters(f => ({ ...f, dateFrom: e.target.value }))} /></div>
                <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Fecha Hasta</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters(f => ({ ...f, dateTo: e.target.value }))} /></div>
                <SearchableDropdown label="Activo" icon="fas fa-check-circle" options={ACTIVE_OPTS} value={filters.active} onChange={(val) => setFilters(f => ({ ...f, active: val }))} placeholder="Todos los Clientes" />
                <SearchableDropdown label="Tipo de Cliente" icon="fas fa-user-group" options={CUSTOMER_TYPE_OPTS} value={filters.customerType} onChange={(val) => setFilters(f => ({ ...f, customerType: val }))} placeholder="Todos los Tipos" />
                <SearchableDropdown label="Agregado por" icon="fas fa-user" options={uniqueUsers.map(u => ({ value: u, label: u }))} value={filters.addedBy} onChange={(val) => setFilters(f => ({ ...f, addedBy: val }))} placeholder="Todos los Usuarios" />
              </div>
            </div>
          )}
          {loading && <TableSkeleton rows={8} columns={8} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="recordsTable" className="display" style={{ width: '100%' }}></table>
            {records.length > 0 && <SummaryBar items={[{ label: 'Clientes', value: records.length }, { label: 'Activos', value: records.filter(r => r.active).length }, { label: 'Saldo Total', value: money(records.reduce((s, r) => s + Number(r.amount || 0), 0)) }]} />}
          </div>
          {viewCust && <CustomerHubModal customer={viewCust} onClose={() => setViewCust(null)} />}
          {showModal && <RecordModal record={byId[editingId]} onClose={() => { setShowModal(false); setEditingId(null); }} onSave={handleSave} />}
        </div>
      );
    }

    // --- Product Modal (Add/Edit) ---
    function ProductModal({ product, onClose, onSave }) {
      const catOpts = useCategoryOpts();
      const { settings } = useConfig();
      const [formData, setFormData] = useState({
        name: product?.name || '', category: product?.category || '', price: product?.price ?? '',
        cost: product?.cost ?? '', reorderLevel: product?.reorderLevel ?? '', unit: product?.unit || '',
        barcode: product?.barcode || '', brand: product?.brand || '', supplier: product?.supplier || '',
        taxRate: product?.taxRate ?? '', status: product?.status || 'active',
        wholesalePrice: product?.wholesalePrice ?? '', mrp: product?.mrp ?? '',
        maxStock: product?.maxStock ?? '', reorderQty: product?.reorderQty ?? '',
        location: product?.location || '', batchNo: product?.batchNo || '', expiryDate: product?.expiryDate || '',
        imageUrl: product?.imageUrl || '', description: product?.description || ''
      });
      const [saving, setSaving] = useState(false);
      const num = (v) => Number(v) || 0;

      const submit = async (e) => {
        e.preventDefault();
        setSaving(true);
        // blank tax rate -> null so POS inherits the store default; explicit 0 stays 0 (tax-exempt)
        await onSave({
          ...formData,
          price: num(formData.price), cost: num(formData.cost), reorderLevel: num(formData.reorderLevel),
          taxRate: formData.taxRate === '' ? null : num(formData.taxRate), wholesalePrice: num(formData.wholesalePrice), mrp: num(formData.mrp),
          maxStock: num(formData.maxStock), reorderQty: num(formData.reorderQty),

        setSaving(false); // re-enable on failed save (parent keeps modal open)

                  <input type="text" value={product ? product.sku : 'Generado automáticamente'} disabled />
                </div>
                {formData.imageUrl ? <div className="prod-img-preview"><img src={formData.imageUrl} alt="" onError={(e) => { e.target.style.display = 'none'; }} /></div> : null}
                <div className="form-grid">
                  <div className="form-group"><label>Nombre del Producto *</label><input type="text" value={formData.name} onChange={(e) => setFormData(p => ({ ...p, name: e.target.value }))} required /></div>
                  <SearchableDropdown label="Categoría" icon="fas fa-tag" options={catOpts} value={formData.category} onChange={(val) => setFormData(p => ({ ...p, category: val }))} placeholder="Seleccionar categoría..." required={true} />
                  <div className="form-group"><label>Marca</label><input type="text" value={formData.brand} onChange={(e) => setFormData(p => ({ ...p, brand: e.target.value }))} /></div>
                  <div className="form-group"><label><i className="fas fa-barcode"></i> Código de Barras</label><input type="text" placeholder="Escanear o escribir..." value={formData.barcode} onChange={(e) => setFormData(p => ({ ...p, barcode: e.target.value }))} /></div>
                  <div className="form-group"><label>Precio de Venta *</label><input type="number" step="0.01" min="0" value={formData.price} onChange={(e) => setFormData(p => ({ ...p, price: e.target.value }))} required /></div>
                  <div className="form-group"><label>Costo</label><input type="number" step="0.01" min="0" value={formData.cost} onChange={(e) => setFormData(p => ({ ...p, cost: e.target.value }))} /></div>
                  <div className="form-group"><label>Precio Mayorista</label><input type="number" step="0.01" min="0" value={formData.wholesalePrice} onChange={(e) => setFormData(p => ({ ...p, wholesalePrice: e.target.value }))} /></div>
                  <div className="form-group"><label>Precio de Lista</label><input type="number" step="0.01" min="0" value={formData.mrp} onChange={(e) => setFormData(p => ({ ...p, mrp: e.target.value }))} /></div>
                  <div className="form-group"><label>Tasa Impuesto % {settings?.taxRate ? `(defecto ${settings.taxRate}%)` : ''}</label><input type="number" step="0.01" min="0" placeholder="vacío = defecto" value={formData.taxRate} onChange={(e) => setFormData(p => ({ ...p, taxRate: e.target.value }))} /></div>
                  <div className="form-group"><label>Unidad</label><input type="text" placeholder="pz, caja, kg..." value={formData.unit} onChange={(e) => setFormData(p => ({ ...p, unit: e.target.value }))} /></div>
                  <div className="form-group"><label>Nivel de Reorden *</label><input type="number" step="1" min="0" value={formData.reorderLevel} onChange={(e) => setFormData(p => ({ ...p, reorderLevel: e.target.value }))} required /></div>
                  <div className="form-group"><label>Stock Máximo</label><input type="number" step="1" min="0" value={formData.maxStock} onChange={(e) => setFormData(p => ({ ...p, maxStock: e.target.value }))} /></div>
                  <div className="form-group"><label>Cant. Reorden</label><input type="number" step="1" min="0" placeholder="monto de restock" value={formData.reorderQty} onChange={(e) => setFormData(p => ({ ...p, reorderQty: e.target.value }))} /></div>
                  <div className="form-group"><label>Proveedor</label><input type="text" value={formData.supplier} onChange={(e) => setFormData(p => ({ ...p, supplier: e.target.value }))} /></div>
                  <div className="form-group"><label><i className="fas fa-location-dot"></i> Ubicación</label><input type="text" placeholder="Pasillo-Estante" value={formData.location} onChange={(e) => setFormData(p => ({ ...p, location: e.target.value }))} /></div>
                  <div className="form-group"><label>Lote</label><input type="text" value={formData.batchNo} onChange={(e) => setFormData(p => ({ ...p, batchNo: e.target.value }))} /></div>
                  <div className="form-group"><label><i className="fas fa-calendar-xmark"></i> Fecha Caducidad</label><input type="date" value={formData.expiryDate} onChange={(e) => setFormData(p => ({ ...p, expiryDate: e.target.value }))} /></div>
                  <SearchableDropdown label="Estado" icon="fas fa-toggle-on" options={STATUS_OPTS} value={formData.status} onChange={(val) => setFormData(p => ({ ...p, status: val }))} placeholder="Activo" />
                </div>
                <div className="form-group"><label><i className="fas fa-image"></i> URL de Imagen</label><input type="text" placeholder="https://..." value={formData.imageUrl} onChange={(e) => setFormData(p => ({ ...p, imageUrl: e.target.value }))} /></div>
                <div className="form-group"><label>Descripción</label><textarea rows="2" value={formData.description} onChange={(e) => setFormData(p => ({ ...p, description: e.target.value }))}></textarea></div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Guardando...</> : <><i className="fas fa-save"></i> Guardar</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

        QRCode.toCanvas(printRef.current, product.id, { width: 300, margin: 0 }, () => { });

    // --- Bulk QR label printing ---
    function PrintAllLabels({ products, onDone }) {
      const canvasRefs = useRef({});

      useEffect(() => {
        let cancelled = false;
        Promise.all(products.map(p => QRCode.toCanvas(canvasRefs.current[p.id], p.id, { width: 300, margin: 0 })))
          .then(() => { if (!cancelled) window.print(); })
          .catch((e) => console.error('qr render failed', e));
        return () => { cancelled = true; };
      }, [products]);

      useEffect(() => {
        const afterPrint = () => onDone();
        window.addEventListener('afterprint', afterPrint);
        return () => window.removeEventListener('afterprint', afterPrint);
      }, [onDone]);

      return (
        <div className="qr-print-stage">
          {products.map(p => (
            <div className="qr-label-print" key={p.id}>
              <canvas ref={(el) => { canvasRefs.current[p.id] = el; }}></canvas>
              <div className="qr-label-sku">{p.sku}</div>
            </div>
          ))}
        </div>
      );
    }

      const { loading, data, err } = useFetch(() => Promise.all([fbGetProducts(), fbGetStockMovements()]), [reloadKey]);
      const products = useMemo(() => (data && data[0] && data[0].success ? data[0].data : []), [data]);
      const movements = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const reload = () => setReloadKey(k => k + 1);

      const tableData = useMemo(() => products.map(p => Object.assign({}, p, { qtyOnHand: computeQtyOnHand(p.id, movements) })), [products, movements]);
      const byId = useMemo(() => products.reduce((m, p) => (m[p.id] = p, m), {}), [products]);
      const openEdit = useCallback((id) => { setEditingId(id); setShowModal(true); }, []);

      useEffect(() => {
        if (err || (data && data[0] && !data[0].success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data[0] && data[0].message) || 'Error al cargar productos' });
      }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableInstanceRef.current;
        if (table) {
          table.clear().rows.add(tableData).draw(false);
        } else {
          table = $('#productsTable').DataTable({
            data: tableData,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            createdRow: (row, d) => { if (Number(d.qtyOnHand) <= Number(d.reorderLevel || 0)) $(row).addClass('row-warn'); }, // low stock
            columns: [
              { data: 'imageUrl', title: '', orderable: false, render: (d, t) => t === 'display' ? (d ? `<img class="prod-thumb" src="${esc(d)}" onerror="this.style.visibility='hidden'">` : `<span class="prod-thumb empty"><i class="fas fa-box"></i></span>`) : '' },
              { data: 'name', title: 'Nombre', render: (d, t, row) => t === 'display' ? esc(d) + (row.brand ? `<div class="cell-sub">${esc(row.brand)}</div>` : '') : d },
              { data: 'sku', title: 'SKU', render: (d, t) => t === 'display' ? '<code>' + esc(d) + '</code>' : d },
              { data: 'barcode', title: 'Cód. Barras', render: (d, t) => t === 'display' ? (d ? '<code>' + esc(d) + '</code>' : '<span style="color:#bbb">—</span>') : (d || '') },
              { data: 'category', title: 'Categoría', render: (d, t) => t === 'display' ? esc(d) : d },
              { data: 'price', title: 'Precio', render: (d, t) => t === 'display' ? money(d) : d },
              { data: 'qtyOnHand', title: 'Cant. Disponible', render: (d, t, row) => t === 'display' ? (Number(d) <= Number(row.reorderLevel || 0) ? '<span class="status-badge status-inactive">' + d + '</span>' : d) : d },
              { data: 'reorderLevel', title: 'Nivel Reorden' },
              { data: 'status', title: 'Estado', render: (d, t) => t === 'display' ? (d === 'discontinued' ? '<span class="status-badge status-inactive">Descontinuado</span>' : '<span class="status-badge status-active">Activo</span>') : (d || 'active') },
              { data: null, title: 'Acciones', orderable: false, render: () => `<button class="action-icon" data-action="view" title="Ver"><i class="fas fa-eye"></i></button><button class="action-icon edit-icon" data-action="edit" title="Editar"><i class="fas fa-edit"></i></button><button class="action-icon qr-icon" data-action="qr" title="QR"><i class="fas fa-qrcode"></i></button>` + (role === 'Admin' ? `<button class="action-icon delete-icon" data-action="delete" title="Eliminar"><i class="fas fa-trash"></i></button>` : '') }
            ],
            pageLength: 10,
            lengthMenu: [[10, 25, 50, -1], [10, 25, 50, 'All']],
            responsive: true,
            dom: 'Blfrtip',
            buttons: [
              { extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } },
              { extend: 'print', text: '<i class="fas fa-print"></i> Imprimir', exportOptions: { columns: ':not(:last-child)' } }
            ],
            order: [[1, 'asc']]
          });
          tableInstanceRef.current = table;
        }
        $('#productsTable').off('click', '.action-icon').on('click', '.action-icon', function () {
          const id = table.row($(this).parents('tr')).data().id;
          const action = $(this).data('action');
          if (action === 'view') setViewProd(byId[id]);
          else if (action === 'edit') openEdit(id);
          else if (action === 'qr') setQrProductId(id);
          else handleDelete(byId[id]);
        });
      }, [loading, tableData, role]);

      useEffect(() => () => {
        const ext = $.fn.dataTable.ext.search;
        const i = ext.indexOf(searchFnRef.current); if (i !== -1) ext.splice(i, 1); // stop the filter leaking into other views' tables
        if (tableInstanceRef.current) { try { tableInstanceRef.current.destroy(); tableInstanceRef.current = null; } catch (e) { } }
      }, []);

      const applyFilters = () => {
        if (!tableInstanceRef.current) return;
        const dt = tableInstanceRef.current;
        const ext = $.fn.dataTable.ext.search;
        const prev = ext.indexOf(searchFnRef.current); if (prev !== -1) ext.splice(prev, 1); // replace our own predicate only
        const fn = (settings, dataRow, dataIndex) => {
          const p = tableData[dataIndex];
          if (!p) return true;
          if (filters.category && p.category !== filters.category) return false;
          if (filters.lowStock === '1' && !(Number(p.qtyOnHand) <= Number(p.reorderLevel || 0))) return false;
          if (filters.status && (p.status || 'active') !== filters.status) return false;
          return true;
        };
        searchFnRef.current = fn; ext.push(fn);
        dt.draw();
      };

      const clearFilters = () => {
        setFilters({ category: '', lowStock: '', status: '' });
        const ext = $.fn.dataTable.ext.search;
        const i = ext.indexOf(searchFnRef.current); if (i !== -1) ext.splice(i, 1);
        searchFnRef.current = null;
        if (tableInstanceRef.current) tableInstanceRef.current.draw();
      };

      useEffect(() => { if (tableInstanceRef.current && tableData.length > 0) applyFilters(); }, [filters, tableData]);

      const isFiltered = !!(filters.category || filters.lowStock || filters.status);
      const reorderRows = useMemo(() => tableData.filter(p => Number(p.qtyOnHand) <= Number(p.reorderLevel || 0)), [tableData]);
      const stockValue = useMemo(() => tableData.reduce((s, p) => s + Number(p.qtyOnHand || 0) * (Number(p.cost) || 0), 0), [tableData]);

      const handlePrintLabels = () => {
        const dt = tableInstanceRef.current;
        setPrintRows(dt ? dt.rows({ search: 'applied' }).data().toArray() : tableData);
        setPrintAll(true);
      };

      const handleSave = async (formData) => {
        setLoad(editingId ? 'Actualizando producto...' : 'Guardando producto...');
        const result = editingId ? await fbUpdateProduct(editingId, formData, user) : await fbAddProduct(formData, user);
        setLoad('');
        if (result.success) {
          setShowModal(false); setEditingId(null);
          Swal.fire({ icon: 'success', title: '¡Éxito!', text: result.message, timer: 2000, showConfirmButton: false });
          reload();
        } else {
          Swal.fire({ icon: 'error', title: 'Error', text: result.message });
        }
      };

      const handleDelete = (product) => {
        Swal.fire({ icon: 'warning', title: '¿Eliminar?', text: 'Esta acción no se puede deshacer', showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Eliminar', cancelButtonText: 'Cancelar' }).then(async (result) => {
          if (!result.isConfirmed) return;
          setLoad('Eliminando producto...');
          const r = await fbDeleteProduct(product.id, product.name, user);
          setLoad('');
          if (r.success) { Swal.fire({ icon: 'success', text: r.message, timer: 2000, showConfirmButton: false }); reload(); }
          else Swal.fire({ icon: 'error', title: 'Error', text: r.message });
        });
      };

      return (
        <div className="data-section">
          {load && <TopLoadingBar />}
          <div className="section-header">
            <h2><i className="fas fa-boxes-stacked"></i> Productos</h2>
            <div style={{ display: 'flex', gap: '10px' }}>
              <RefreshBtn onClick={reload} />
              <button className="btn btn-secondary" onClick={() => setShowReorderReport(true)} disabled={reorderRows.length === 0}><i className="fas fa-triangle-exclamation"></i> Imprimir Reporte de Reorden</button>
              <button className="btn btn-secondary" onClick={handlePrintLabels} disabled={products.length === 0}><i className="fas fa-print"></i> {isFiltered ? 'Imprimir Etiquetas Filtradas' : 'Imprimir Etiquetas QR'}</button>
              <button className="btn btn-success" onClick={() => { setEditingId(null); setShowModal(true); }}><i className="fas fa-plus"></i> Agregar Producto</button>
            </div>
          </div>
          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3><i className="fas fa-filter"></i> Filtros</h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Limpiar Todo</button>
              </div>
              <div className="filters-grid">
                <SearchableDropdown label="Categoría" icon="fas fa-tag" options={catOpts} value={filters.category} onChange={(val) => setFilters(f => ({ ...f, category: val }))} placeholder="Todas las categorías" />
                <SearchableDropdown label="Estado del Stock" icon="fas fa-triangle-exclamation" options={LOW_STOCK_OPTS} value={filters.lowStock} onChange={(val) => setFilters(f => ({ ...f, lowStock: val }))} placeholder="Todos los niveles" />
                <SearchableDropdown label="Estado" icon="fas fa-toggle-on" options={PRODUCT_STATUS_FILTER} value={filters.status} onChange={(val) => setFilters(f => ({ ...f, status: val }))} placeholder="Todos los estados" />
              </div>
            </div>
          )}
          {loading && <TableSkeleton rows={8} columns={7} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="productsTable" className="display" style={{ width: '100%' }}></table>
            {products.length > 0 && <SummaryBar items={[{ label: 'Productos', value: products.length }, { label: 'Valor del Stock', value: money(stockValue) }, { label: 'Stock Bajo', value: reorderRows.length }]} />}
          </div>
          {showModal && <ProductModal product={byId[editingId]} onClose={() => { setShowModal(false); setEditingId(null); }} onSave={handleSave} />}
          {viewProd && <ProductHubModal product={viewProd} onClose={() => setViewProd(null)} />}
          {qrProductId && <QRModal product={byId[qrProductId]} onClose={() => setQrProductId(null)} />}
          {printAll && <PrintAllLabels products={printRows} onDone={() => setPrintAll(false)} />}
          {showReorderReport && <ReorderReportPrint rows={reorderRows} onDone={() => setShowReorderReport(false)} />}
        </div>
      );
    }

    // --- Stock Movement Modal (Stock In / Stock Out - same modal, fixed type prop) ---
    function StockMovementModal({ type, products, movements, onClose, onSave }) {
      const [productId, setProductId] = useState('');
      const [qty, setQty] = useState('');
      const [reason, setReason] = useState(type === 'out' ? 'Damage' : 'Purchase');
      const [reference, setReference] = useState('');
      const [unitCost, setUnitCost] = useState('');
      const [updateCost, setUpdateCost] = useState(true);
      const [supplier, setSupplier] = useState('');
      const [batchNo, setBatchNo] = useState('');
      const [expiryDate, setExpiryDate] = useState('');
      const [location, setLocation] = useState('');
      const [notes, setNotes] = useState('');
      const [saving, setSaving] = useState(false);

      const isOut = type === 'out';
      const productOpts = useMemo(() => (products || []).map(p => ({ value: p.id, label: `${p.name} (${p.sku})` })), [products]);
      const selectedProduct = (products || []).find(p => p.id === productId);
      const onHand = useMemo(() => productId ? computeQtyOnHand(productId, movements) : 0, [productId, movements]);

      // prefill cost + location from the product when picked (for IN)
      useEffect(() => { if (selectedProduct && !isOut) { setUnitCost(c => c || (selectedProduct.cost ?? '')); setLocation(l => l || (selectedProduct.location || '')); } }, [productId]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const q = Number(qty);
        if (!productId) return Swal.fire({ icon: 'warning', title: 'Elige un Producto', text: 'Selecciona un producto primero' });
        if (!Number.isInteger(q) || q < 1) return Swal.fire({ icon: 'warning', title: 'Cantidad Inválida', text: 'La cantidad debe ser un número entero, al menos 1' });
        if (isOut && q > onHand) {
          const confirm = await Swal.fire({
            icon: 'warning', title: 'Advertencia de Cantidad Disponible',
            text: `Solo hay ${onHand} unidad(es) disponible(s) para este producto. Esta Salida dejará la cantidad en ${onHand - q}. ¿Continuar de todos modos?`,
            showCancelButton: true, confirmButtonColor: '#ea4335', confirmButtonText: 'Continuar', cancelButtonText: 'Cancelar'
          });
          if (!confirm.isConfirmed) return;
        }
        setSaving(true);
        const move = { productId, type, qty: q, reason, reference: reference.trim() || null, location: location.trim() || null, notes: notes.trim() || null };
        if (!isOut) { move.unitCost = Number(unitCost) || 0; move.supplier = supplier.trim() || null; move.batchNo = batchNo.trim() || null; move.expiryDate = expiryDate || null; move.updateCost = updateCost && Number(unitCost) > 0; }
        await onSave(move, selectedProduct?.name || 'Producto Desconocido');
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className={`fas ${isOut ? 'fa-arrow-up' : 'fa-arrow-down'}`}></i> {isOut ? 'Salida' : 'Entrada'} de Stock</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <form onSubmit={handleSubmit}>
                <div className="form-grid">
                  <SearchableDropdown label="Producto" icon="fas fa-box" options={productOpts} value={productId} onChange={setProductId} placeholder="Buscar producto por nombre o SKU..." required={true} />
                  <div className="form-group"><label>Cantidad *</label><input type="number" min="1" step="1" value={qty} onChange={(e) => setQty(e.target.value)} required /></div>
                </div>
                {productId && <p className="stock-onhand-hint">Cant. disponible: <strong>{onHand}</strong>{!isOut && Number(qty) > 0 ? ` → ${onHand + Number(qty)}` : ''}</p>}
                <div className="form-grid">
                  <SearchableDropdown label="Motivo" icon="fas fa-clipboard-list" options={isOut ? REASON_OUT_OPTS : REASON_IN_OPTS} value={reason} onChange={setReason} placeholder="Seleccionar motivo..." required={true} />
                  <div className="form-group"><label>Referencia</label><input type="text" value={reference} onChange={(e) => setReference(e.target.value)} placeholder="Nº Orden / factura / venta" /></div>
                  {!isOut && <div className="form-group"><label>Costo Unitario</label><input type="number" min="0" step="0.01" value={unitCost} onChange={(e) => setUnitCost(e.target.value)} /></div>}
                  {!isOut && <div className="form-group"><label>Proveedor</label><input type="text" value={supplier} onChange={(e) => setSupplier(e.target.value)} /></div>}
                  {!isOut && <div className="form-group"><label>Lote</label><input type="text" value={batchNo} onChange={(e) => setBatchNo(e.target.value)} /></div>}
                  {!isOut && <div className="form-group"><label><i className="fas fa-calendar-xmark"></i> Fecha Caducidad</label><input type="date" value={expiryDate} onChange={(e) => setExpiryDate(e.target.value)} /></div>}
                  <div className="form-group"><label><i className="fas fa-location-dot"></i> Ubicación</label><input type="text" value={location} onChange={(e) => setLocation(e.target.value)} /></div>
                </div>
                {!isOut && <div className="form-group"><label className="stock-cost-check"><input type="checkbox" checked={updateCost} onChange={(e) => setUpdateCost(e.target.checked)} /> Actualizar el costo del producto con este costo unitario</label></div>}
                <div className="form-group"><label>Notas</label><textarea rows="2" value={notes} onChange={(e) => setNotes(e.target.value)}></textarea></div>
                <div className="form-actions">
                  <button type="submit" className={`btn ${isOut ? 'btn-danger' : 'btn-success'}`} disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Guardando...</> : <><i className="fas fa-save"></i> Registrar {isOut ? 'Salida' : 'Entrada'}</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- Stock View (ledger DataTable + Stock In / Stock Out buttons) ---
    // --- Bulk Stock In (receiving a supplier delivery in one go) ---
    function BulkStockInModal({ products, onClose, onSave }) {
      const [lines, setLines] = useState([]);
      const [productId, setProductId] = useState('');
      const [qty, setQty] = useState('');
      const [reason, setReason] = useState('');
      const [reference, setReference] = useState('');
      const [saving, setSaving] = useState(false);

      const productOpts = useMemo(() => (products || []).map(p => ({ value: p.id, label: `${p.name} (${p.sku})` })), [products]);
      const byId = useMemo(() => (products || []).reduce((m, p) => (m[p.id] = p, m), {}), [products]);
      const totalQty = useMemo(() => lines.reduce((s, l) => s + l.qty, 0), [lines]);

      const addLine = () => {
        const q = Number(qty);
        if (!productId) return Swal.fire({ icon: 'warning', title: 'Elige un Producto', text: 'Selecciona un producto primero' });
        if (!Number.isInteger(q) || q < 1) return Swal.fire({ icon: 'warning', title: 'Cantidad Inválida', text: 'La cantidad debe ser un número entero, al menos 1' });
        const product = byId[productId];
        setLines(prev => {
          const existing = prev.find(l => l.productId === productId);
          if (existing) return prev.map(l => l.productId === productId ? { ...l, qty: l.qty + q } : l);
          return [...prev, { productId, name: product.name, sku: product.sku, qty: q }];
        });
        setProductId(''); setQty('');
      };

      const removeLine = (pid) => setLines(prev => prev.filter(l => l.productId !== pid));

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!lines.length) return Swal.fire({ icon: 'warning', title: 'Sin Artículos', text: 'Agrega al menos una línea de producto' });
        if (!reason.trim()) return Swal.fire({ icon: 'warning', title: 'Motivo Requerido', text: 'Ingresa un motivo, ej. Compra / Entrega de Proveedor' });
        setSaving(true);
        const batchLines = lines.map(l => ({ productId: l.productId, name: l.name, qty: l.qty, reason: reason.trim(), reference: reference.trim() || null }));
        await onSave(batchLines);
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-truck-ramp-box"></i> Recepción Masiva de Stock</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <SearchableDropdown label="Producto" icon="fas fa-box" options={productOpts} value={productId} onChange={setProductId} placeholder="Buscar producto por nombre o SKU..." />
                <div className="form-group"><label>Cantidad</label><input type="number" min="1" step="1" value={qty} onChange={(e) => setQty(e.target.value)} /></div>
              </div>
              <div className="form-actions" style={{ marginTop: 0, marginBottom: '20px' }}>
                <button type="button" className="btn btn-secondary btn-sm" onClick={addLine}><i className="fas fa-plus"></i> Agregar Línea</button>
              </div>
              {lines.length > 0 && (
                <div className="pos-cart-list" style={{ marginBottom: '20px' }}>
                  {lines.map(l => (
                    <div className="pos-cart-row" key={l.productId}>
                      <div className="pi-name"><strong>{l.name}</strong><small>SKU: {l.sku}</small></div>
                      <div className="pos-line-total">Cant.: {l.qty}</div>
                      <button type="button" className="pos-remove-btn" title="Quitar línea" onClick={() => removeLine(l.productId)}><i className="fas fa-trash"></i></button>
                    </div>
                  ))}
                </div>
              )}
              <form onSubmit={handleSubmit}>
                <div className="form-grid">
                  <div className="form-group"><label>Motivo *</label><input type="text" value={reason} onChange={(e) => setReason(e.target.value)} placeholder="ej. Entrega de Proveedor, Compra" required /></div>
                  <div className="form-group"><label>Referencia</label><input type="text" value={reference} onChange={(e) => setReference(e.target.value)} placeholder="Opcional - ej. Nº Orden Compra" /></div>
                </div>
                {lines.length > 0 && <p className="stock-onhand-hint">Total de unidades a recibir: <strong>{totalQty}</strong></p>}
                <div className="form-actions">
                  <button type="submit" className="btn btn-success" disabled={saving || lines.length === 0}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Guardando...</> : <><i className="fas fa-save"></i> Recibir Stock</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- Stocktake / Adjustment - enter the counted qty, we post the correcting in/out movement ---
    function StockAdjustModal({ products, movements, onClose, onSave }) {
      const [productId, setProductId] = useState('');
      const [counted, setCounted] = useState('');
      const [notes, setNotes] = useState('');
      const [saving, setSaving] = useState(false);
      const productOpts = useMemo(() => (products || []).map(p => ({ value: p.id, label: `${p.name} (${p.sku})` })), [products]);
      const selected = (products || []).find(p => p.id === productId);
      const onHand = useMemo(() => productId ? computeQtyOnHand(productId, movements) : 0, [productId, movements]);
      const diff = counted === '' ? 0 : (Number(counted) - onHand);

      const submit = async (e) => {
        e.preventDefault();
        if (!productId) return Swal.fire({ icon: 'warning', title: 'Elige un Producto' });
        if (counted === '' || Number(counted) < 0) return Swal.fire({ icon: 'warning', title: 'Ingresa la cant. contada' });
        if (diff === 0) return Swal.fire({ icon: 'info', title: 'Sin cambios', text: 'La cantidad contada coincide con la disponible.' });
        setSaving(true);
        await onSave({ productId, type: diff > 0 ? 'in' : 'out', qty: Math.abs(diff), reason: 'Ajuste', reference: 'Inventario', notes: notes.trim() || `Contado ${counted}, había ${onHand}` }, selected?.name || 'Producto Desconocido');
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header"><h3><i className="fas fa-scale-balanced"></i> Inventario / Ajuste</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
            <div className="modal-body">
              <form onSubmit={submit}>
                <SearchableDropdown label="Producto" icon="fas fa-box" options={productOpts} value={productId} onChange={setProductId} placeholder="Buscar producto..." required={true} />
                {productId && <p className="stock-onhand-hint">En sistema: <strong>{onHand}</strong></p>}
                <div className="form-grid">
                  <div className="form-group"><label>Cantidad Contada *</label><input type="number" min="0" step="1" value={counted} onChange={(e) => setCounted(e.target.value)} required /></div>
                  <div className="form-group"><label>Ajuste</label><input type="text" value={productId && counted !== '' ? (diff > 0 ? '+' + diff + ' (Entrada)' : diff < 0 ? diff + ' (Salida)' : 'Sin cambios') : '-'} disabled /></div>
                </div>
                <div className="form-group"><label>Notas</label><textarea rows="2" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Motivo de la diferencia (daño, mal conteo...)"></textarea></div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={saving}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Registrando...</> : <><i className="fas fa-save"></i> Registrar Ajuste</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancelar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function StockView({ user, role }) {
      const [modalType, setModalType] = useState(null);
      const [showBulkIn, setShowBulkIn] = useState(false);
      const [showAdjust, setShowAdjust] = useState(false);
      const [reloadKey, setReloadKey] = useState(0);
      const [load, setLoad] = useState('');
      const tableInstanceRef = useRef(null);

      const { loading, data, err } = useFetch(() => Promise.all([fbGetStockMovements(), fbGetProducts()]), [reloadKey]);
      const movements = useMemo(() => (data && data[0] && data[0].success ? data[0].data : []), [data]);
      const products = useMemo(() => (data && data[1] && data[1].success ? data[1].data : []), [data]);
      const reload = () => setReloadKey(k => k + 1);

      const productMap = useMemo(() => products.reduce((m, p) => (m[p.id] = p, m), {}), [products]);
      const byId = useMemo(() => movements.reduce((m, mv) => (m[mv.id] = mv, m), {}), [movements]);
      // running per-product balance: cumulate oldest→newest, tag each row with the balance right after it
      const tableData = useMemo(() => {
        const sorted = [...movements].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
        const run = {};
        return sorted.map(m => {
          run[m.productId] = (run[m.productId] || 0) + (m.type === 'in' ? m.qty : -m.qty);
          return Object.assign({}, m, { productName: productMap[m.productId]?.name || 'Unknown Product', balance: run[m.productId] });
        });
      }, [movements, productMap]);

      useEffect(() => {
        if (err || (data && data[0] && !data[0].success)) Swal.fire({ icon: 'error', title: 'Error', text: (data && data[0] && data[0].message) || 'Error al cargar movimientos de stock' });
      }, [err, data]);

      useEffect(() => {
        if (loading) return;
        let table = tableInstanceRef.current;
        if (table) {
          table.clear().rows.add(tableData).draw(false);
        } else {
          table = $('#stockTable').DataTable({
            data: tableData,
            columnDefs: [{ targets: '_all', defaultContent: '' }], // tolerate rows missing newer fields - no "unknown parameter" warning
            columns: [
              { data: 'productName', title: 'Producto', render: (d, t) => t === 'display' ? esc(d) : d },
              { data: 'type', title: 'Tipo', render: (d, t) => t === 'display' ? `<span class="status-badge ${d === 'in' ? 'status-active' : 'status-inactive'}">${d === 'in' ? 'ENTRADA' : 'SALIDA'}</span>` : d },
              { data: 'qty', title: 'Cant.', render: (d, t) => t === 'display' ? Number(d).toLocaleString() : d },
              { data: 'unitCost', title: 'Costo Unit.', defaultContent: '-', render: (d, t) => t === 'display' ? (d ? money(d) : '-') : (d || 0) },
              { data: 'reason', title: 'Motivo', render: (d, t) => t === 'display' ? esc(d || '') : d },
              { data: 'reference', title: 'Referencia', defaultContent: '-', render: (d, t) => t === 'display' ? esc(d || '-') : d },
              { data: 'balance', title: 'Saldo', render: (d, t) => t === 'display' ? `<strong>${Number(d).toLocaleString()}</strong>` : d },
              { data: 'performedBy', title: 'Realizado Por', render: (d, t) => t === 'display' ? esc(d || '') : d },
              { data: 'createdAt', title: 'Fecha', render: (d, t) => t === 'display' ? formatDateForDisplay(d) : d },

      const handleSave = async (moveData, productName) => {

        setLoad(move.type === 'in' ? 'Registrando Entrada...' : 'Registrando Salida...');

    // --- Camera scan modal (secondary path, feeds the same resolve function as manual input) ---
    function CameraScanModal({ onDetected, onClose }) {
      const scannerRef = useRef(null);
      const runningRef = useRef(false);
      const [camState, setCamState] = useState('idle'); // idle | requesting | scanning | error
      const [camError, setCamError] = useState('');

      const safeStop = useCallback(() => {
        if (!runningRef.current || !scannerRef.current) return;
        runningRef.current = false;
        try { scannerRef.current.stop().then(() => scannerRef.current.clear()).catch(() => {}); } catch(e) {}
      }, []);

      const startScanner = useCallback(async () => {
        setCamState('requesting');
        setCamError('');
        try {
          // Request permission explicitly first (user gesture context)
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          // Permission granted - stop this test stream
          stream.getTracks().forEach(t => t.stop());
        } catch (permErr) {
          const msg = permErr && permErr.name === 'NotAllowedError'
            ? 'Permiso de cámara denegado. Por favor, permite el acceso a la cámara en la configuración de tu navegador y vuelve a intentarlo.'
            : permErr && permErr.name === 'NotFoundError'
            ? 'No se encontró ninguna cámara en este dispositivo.'
            : 'No se pudo acceder a la cámara: ' + (permErr && permErr.message ? permErr.message : permErr);
          setCamState('error');
          setCamError(msg);
          return;
        }

        // Now start the QR scanner (permission already granted)
        try {
          const qr = new Html5Qrcode('pos-qr-reader');
          scannerRef.current = qr;
          await qr.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
              safeStop();
              onDetected(decodedText);
            },
            () => {}
          );
          runningRef.current = true;
          setCamState('scanning');
        } catch (startErr) {
          setCamState('error');
          setCamError('Error al iniciar el escáner: ' + (startErr && startErr.message ? startErr.message : startErr));
        }
      }, [onDetected, safeStop]);

      // Auto-start on mount (works on desktop), but on mobile the user may need to tap
      useEffect(() => {
        // Small delay to let DOM render the #pos-qr-reader div first
        const t = setTimeout(() => startScanner(), 300);
        return () => { clearTimeout(t); safeStop(); };
      }, []);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ maxWidth: '480px' }} onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-camera"></i> Escanear con Cámara</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              {camState === 'error' && (
                <div style={{ textAlign: 'center', padding: '20px 10px' }}>
                  <i className="fas fa-exclamation-triangle" style={{ fontSize: 40, color: '#ea4335', marginBottom: 16, display: 'block' }}></i>
                  <p style={{ color: '#555', fontSize: 14, marginBottom: 20, lineHeight: 1.6 }}>{camError}</p>
                  <button className="btn btn-primary" onClick={startScanner} style={{ margin: '0 auto' }}>
                    <i className="fas fa-redo"></i> Reintentar
                  </button>
                </div>
              )}
              {camState === 'idle' && (
                <div style={{ textAlign: 'center', padding: '30px 10px' }}>
                  <i className="fas fa-camera" style={{ fontSize: 48, color: 'var(--navy-accent)', marginBottom: 16, display: 'block' }}></i>
                  <p style={{ color: '#555', fontSize: 14, marginBottom: 20 }}>Toca el botón para activar la cámara</p>
                  <button className="btn btn-primary" onClick={startScanner}>
                    <i className="fas fa-camera"></i> Activar Cámara
                  </button>
                </div>
              )}
              {camState === 'requesting' && (
                <div style={{ textAlign: 'center', padding: '40px 10px' }}>
                  <i className="fas fa-spinner fa-spin" style={{ fontSize: 36, color: 'var(--navy-accent)', marginBottom: 16, display: 'block' }}></i>
                  <p style={{ color: '#888', fontSize: 14 }}>Solicitando acceso a la cámara...</p>
                </div>
              )}
              <div className="pos-camera-frame" style={{ display: camState === 'scanning' ? 'block' : 'none' }}><div id="pos-qr-reader"></div></div>
              {camState === 'scanning' && <p style={{ textAlign: 'center', color: '#888', fontSize: 13, marginTop: 12 }}>Apunta la cámara al código QR o de barras del producto</p>}
            </div>
          </div>
        </div>
      );
    }
